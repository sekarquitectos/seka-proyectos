  *{box-sizing:border-box;margin:0;padding:0}

  .app-header{background:#1e293b!important;color:#fff!important}

  /* Cards */
  .card{background:#ffffff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}

  /* KPI boxes */
  .kpi{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 16px}

  /* Inputs */
  .inp{width:100%;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:7px 10px;color:#1e293b;font-size:12px;transition:border .15s}

  /* Buttons */
  .btn{background:#e67e22;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity .15s}

  .btn-sm{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;transition:background .15s}
  .btn-sm:hover{background:#e2e8f0}
  .btn-del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px;padding:2px 5px;border-radius:4px;transition:background .15s}
  .btn-del:hover{background:#fef2f2}

  /* Tabs */
  .tab-on{background:#e67e22;color:#fff;border:none;border-radius:5px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  .tab-off{background:transparent;color:#94a3b8;border:none;border-radius:5px;padding:8px 14px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
  .tab-off:hover{background:rgba(255,255,255,.1);color:#fff}

  /* Tables */
  table th{background:#f1f5f9;color:#475569;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-bottom:2px solid #e2e8f0;text-align:left;font-weight:700}
  table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle;color:#1e293b}
  table tr:hover td{background:#fafafa}

  /* Status badges */
  .ok{color:#16a34a;font-weight:600}
  .warn{color:#d97706;font-weight:600}
  .err{color:#dc2626;font-weight:600}
  .none{color:#94a3b8}

  .pbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}

  .modal-bg{position:fixed;inset:0;background:rgba(15,25,35,.5);display:flex;align-items:center;justify-content:center;z-index:500}

// ── FORMAT ────────────────────────────────────────────────────
const cop=n=>{if(n===''||n===null||n===undefined||isNaN(+n))return'—';return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(+n)};
const pct=n=>{if(n===''||n===null||!isFinite(+n))return'—';return(+n*100).toFixed(1)+'%'};
const num=n=>{if(!n&&n!==0)return'—';return(+n).toLocaleString('es-CO')};
const tod=()=>new Date().toISOString().split('T')[0];
const tsLabel=ts=>new Date(ts).toLocaleString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
const uid=()=>Math.random().toString(36).slice(2,10);
const days=(a,b)=>{if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/864e5)};
const fmtSize=b=>{if(b<1024)return b+'B';if(b<1048576)return(b/1024).toFixed(1)+'KB';return(b/1048576).toFixed(1)+'MB'};

// ── INDEXEDDB (files) ─────────────────────────────────────────
const DB_NAME='seka_files_v1',DB_VER=1,STORE='files';
let _db=null;
const getDB=()=>new Promise((res,rej)=>{
  if(_db)return res(_db);
  const r=indexedDB.open(DB_NAME,DB_VER);
  r.onupgradeneeded=e=>{const db=e.target.result;if(!db.objectStoreNames.contains(STORE)){const s=db.createObjectStore(STORE,{keyPath:'id'});s.createIndex('projectId','projectId',{unique:false});s.createIndex('type','type',{unique:false});}};
  r.onsuccess=e=>{_db=e.target.result;res(_db)};r.onerror=e=>rej(e);
});
const dbSave=async(rec)=>{const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(rec).onsuccess=e=>res(e.target.result);tx.onerror=rej;})};
const dbGet=async(id)=>{const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');tx.objectStore(STORE).get(id).onsuccess=e=>res(e.target.result);tx.onerror=rej;})};
const dbGetByProject=async(pid)=>{const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readonly');const req=tx.objectStore(STORE).index('projectId').getAll(pid);req.onsuccess=e=>res(e.target.result);req.onerror=rej;})};
const dbDelete=async(id)=>{const db=await getDB();return new Promise((res,rej)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id).onsuccess=()=>res();tx.onerror=rej;})};
const fileToRec=(file,projectId,type,meta={})=>new Promise(res=>{
  const r=new FileReader();r.onload=e=>res({id:uid(),projectId,type,name:file.name,mime:file.type,size:file.size,date:tod(),data:e.target.result,...meta});r.readAsDataURL(file);
});

// ── LOCALSTORAGE ──────────────────────────────────────────────
const STORE_KEY='seka_v4_projects',BACK_KEY='seka_v4_backups',MAX_BACKS=10;
const lsGet=k=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):null}catch{return null}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn('Storage',e)}};
const loadProjects=()=>lsGet(STORE_KEY)||{};
const saveProject=(id,name,data)=>{const all=loadProjects();all[id]={id,name,lastSaved:Date.now(),data};lsSet(STORE_KEY,all)};
const deleteProject=id=>{const all=loadProjects();delete all[id];lsSet(STORE_KEY,all)};
const loadBackups=pid=>{const all=lsGet(BACK_KEY)||{};return all[pid]||[]};
const saveBackup=(pid,label,data)=>{const all=lsGet(BACK_KEY)||{};const bk=all[pid]||[];bk.unshift({ts:Date.now(),label,data});all[pid]=bk.slice(0,MAX_BACKS);lsSet(BACK_KEY,all)};
const deleteBackup=(pid,ts)=>{const all=lsGet(BACK_KEY)||{};all[pid]=(all[pid]||[]).filter(b=>b.ts!==ts);lsSet(BACK_KEY,all)};

// ── CLOUD SYNC · JSONBin v3 ───────────────────────────────────
const CLOUD_KEY='seka_cloud_config';
const getCloudCfg=()=>lsGet(CLOUD_KEY)||{apiKey:'',binId:'',lastSync:null,autoSync:false};
const setCloudCfg=v=>lsSet(CLOUD_KEY,{...getCloudCfg(),...v});

const cloudSave=async(allProjects)=>{
  const cfg=getCloudCfg();
  if(!cfg.apiKey)throw new Error('Configura tu API Key de JSONBin primero');
  const payload={projects:allProjects,savedAt:new Date().toISOString(),device:navigator.userAgent.includes('iPad')?'iPad':'Desktop'};
  if(cfg.binId){
    // UPDATE existing bin
    const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`,{
      method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':cfg.apiKey},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error(`Error actualizando nube: ${r.status}`);
    setCloudCfg({lastSync:Date.now()});
    return cfg.binId;
  } else {
    // CREATE new bin
    const r=await fetch('https://api.jsonbin.io/v3/b',{
      method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':cfg.apiKey,'X-Bin-Name':'SEKA-Proyectos','X-Bin-Private':'true'},
      body:JSON.stringify(payload)
    });
    if(!r.ok)throw new Error(`Error creando nube: ${r.status}`);
    const d=await r.json();
    const binId=d.metadata?.id;
    setCloudCfg({binId,lastSync:Date.now()});
    return binId;
  }
};

const cloudLoad=async()=>{
  const cfg=getCloudCfg();
  if(!cfg.apiKey)throw new Error('Configura tu API Key primero');
  if(!cfg.binId)throw new Error('No hay datos en la nube aún. Haz una subida primero desde cualquier dispositivo.');
  const r=await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`,{
    headers:{'X-Master-Key':cfg.apiKey}
  });
  if(!r.ok)throw new Error(`Error leyendo nube: ${r.status}`);
  const d=await r.json();
  return d.record;
};

// ── OCR GRATUITO v2 — Tesseract.js v4 (compatible file://) ────
// Sin API key · Sin costo · Corre en tu computador

// ── PDF: extrae texto directo de PDFs digitales ───────────────
const loadPdfJs = () => new Promise((res, rej) => {
  if (window.pdfjsLib) { res(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload = () => {
    window.pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    res();
  };
  s.onerror = () => rej(new Error('No se pudo cargar pdf.js'));
  document.head.appendChild(s);
});

const extractPdfText = async (file) => {
  await loadPdfJs();
  const ab = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
  let text = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 5); i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(it => it.str).join(' ') + '\n';
  }
  return text;
};

const renderPdfToImage = async (file) => {
  await loadPdfJs();
  const ab = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: ab }).promise;
  const page = await pdf.getPage(1);
  const vp = page.getViewport({ scale: 2.5 });
  const canvas = document.createElement('canvas');
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  return new Promise(r => canvas.toBlob(r, 'image/png', 0.95));
};

// ── Tesseract.js v4 — compatible con file:// ─────────────────
const loadTesseract = () => new Promise((res, rej) => {
  if (window.Tesseract) { res(); return; }
  const s = document.createElement('script');
  // v4.1.4 — usa blob worker, funciona sin SharedArrayBuffer (compatible file://)
  s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.4/dist/tesseract.min.js';
  s.onload = res;
  s.onerror = () => rej(new Error('No se pudo cargar el motor OCR. Verifica conexión a internet.'));
  document.head.appendChild(s);
});

const runOCR = async (imageBlob, onProgress) => {
  await loadTesseract();
  // v4 API: createWorker(lang, oem, options)
  const worker = await Tesseract.createWorker(['spa', 'eng'], 1, {
    workerBlobURL: true, // usa blob URL — compatible con file://
    logger: m => {
      if (m.status === 'recognizing text' && onProgress) {
        onProgress(Math.round(m.progress * 100));
      }
    }
  });
  try {
    const { data: { text } } = await worker.recognize(imageBlob);
    return text;
  } finally {
    await worker.terminate();
  }
};

// ── PARSER DE DOCUMENTOS COLOMBIANOS ─────────────────────────
const parseDocText = (text, mode) => {
  const lines = text.split(/\n/).map(l => l.trim()).filter(l => l.length > 1);
  const all = text.replace(/\s+/g, ' ');

  // ── FECHA ──────────────────────────────────────────────────
  const MESES = { enero:1,febrero:2,marzo:3,abril:4,mayo:5,junio:6,julio:7,agosto:8,septiembre:9,octubre:10,noviembre:11,diciembre:12 };
  let fecha = null;
  const datePatterns = [
    { re: /(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/, fn: m => `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}` },
    { re: /(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/, fn: m => `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` },
    { re: /(\d{1,2})\s+de\s+(\w+)\s+(?:de\s+)?(\d{4})/i, fn: m => { const mes=MESES[m[2].toLowerCase()]; return mes?`${m[3]}-${String(mes).padStart(2,'0')}-${m[1].padStart(2,'0')}`:null; } },
    { re: /(\d{1,2})[\.\s](\d{1,2})[\.\s](\d{4})/, fn: m => `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}` },
  ];
  for (const { re, fn } of datePatterns) {
    const m = all.match(re);
    if (m) { const d = fn(m); if (d && !isNaN(new Date(d).getTime())) { fecha = d; break; } }
  }

  // ── PARSER DE VALORES COP ──────────────────────────────────
  const parseNum = s => {
    if (!s) return null;
    const clean = s.replace(/\s/g,'');
    if (/^\d{1,3}(\.\d{3})+$/.test(clean)) return parseFloat(clean.replace(/\./g,''));
    if (/^\d{1,3}(,\d{3})+$/.test(clean)) return parseFloat(clean.replace(/,/g,''));
    if (/^\d{1,3}(\.\d{3})+,\d{1,2}$/.test(clean)) return parseFloat(clean.replace(/\./g,'').replace(',','.'));
    return parseFloat(clean.replace(/[^\d.]/g,''));
  };

  // ── TOTAL ──────────────────────────────────────────────────
  let valorTotal = null;
  const totalPatterns = [
    /(?:TOTAL\s+A\s+PAGAR|NETO\s+A\s+PAGAR|VALOR\s+TOTAL\s+A\s+PAGAR|GRAN\s+TOTAL|TOTAL\s+FACTURA|TOTAL\s+NETO)[^\d]{0,15}([\d.,]+)/i,
    /TOTAL[:\s]{1,5}(?:\$\s*)?([\d.,]{4,})/i,
    /(?:PAGAR|NETO)[:\s]{1,5}(?:\$\s*)?([\d.,]{4,})/i,
  ];
  for (const re of totalPatterns) {
    const m = all.match(re);
    if (m) { const v = parseNum(m[1]); if (v && v > 999) { valorTotal = v; break; } }
  }
  if (!valorTotal) {
    // Last resort: largest number in document
    const nums = [...all.matchAll(/(?<!\d)([\d]{1,3}(?:[.,]\d{3})+)(?!\d)/g)].map(m => parseNum(m[1])).filter(v => v && v > 999 && v < 1e11);
    if (nums.length) valorTotal = Math.max(...nums);
  }

  // ── SUBTOTAL & IVA ─────────────────────────────────────────
  let valorSubtotal = null, iva = null;
  const sm = all.match(/(?:SUBTOTAL|BASE\s+GRAVABLE|BASE\s+IVA)[:\s]{1,5}(?:\$\s*)?([\d.,]{4,})/i);
  const im = all.match(/(?:IVA|I\.V\.A\.?)\s+(?:\d{1,2}%)?[:\s]{1,5}(?:\$\s*)?([\d.,]{4,})/i);
  if (sm) valorSubtotal = parseNum(sm[1]);
  if (im) iva = parseNum(im[1]);

  // ── NÚMERO DE FACTURA ──────────────────────────────────────
  let factura = null;
  const factPatterns = [
    /(?:FACTURA|FAC)\.?\s*(?:DE\s+VENTA\s*)?(?:No\.?|N[°º]|#|Nro\.?)\s*:?\s*([A-Z0-9\-]{2,20})/i,
    /(?:RECIBO|TIQUETE|TICKET)\s*(?:No\.?|N[°º]|#)?\s*:?\s*([A-Z0-9\-]{2,20})/i,
    /(?:No\.?|N[°º])\s*:?\s*(\d{4,})/i,
  ];
  for (const re of factPatterns) {
    const m = all.match(re);
    if (m && m[1].length <= 20) { factura = m[1].trim(); break; }
  }

  // ── PROVEEDOR ──────────────────────────────────────────────
  let proveedor = null;
  const provPatterns = [
    /(?:RAZÓN SOCIAL|RAZON SOCIAL|PROVEEDOR|EMPRESA)\s*:?\s*([A-ZÁÉÍÓÚÑ][^\n]{3,50})/i,
    /NIT[:\s]+[\d.,\-]+\s*[\n\r]+([A-ZÁÉÍÓÚÑ][^\n]{3,50})/i,
  ];
  for (const re of provPatterns) {
    const m = text.match(re);
    if (m) { proveedor = m[1].trim().slice(0, 60); break; }
  }
  if (!proveedor) {
    for (const line of lines.slice(0, 10)) {
      if (line.length > 3 && line.length < 60 && /[A-ZÁÉÍÓÚÑ]{3}/.test(line)
          && !/^\d/.test(line) && !/(NIT|TEL|DIR|FECHA|FAC|CUFE|DIAN|CL |CR )/i.test(line)) {
        proveedor = line; break;
      }
    }
  }

  // ── FORMA DE PAGO ──────────────────────────────────────────
  let formaPago = 'Transferencia';
  if (/\befectivo\b/i.test(all)) formaPago = 'Efectivo';
  else if (/\btarjeta\b/i.test(all)) formaPago = 'Tarjeta';
  else if (/\bcheque\b/i.test(all)) formaPago = 'Cheque';
  else if (/\btransfer/i.test(all) || /\bbancaria\b/i.test(all)) formaPago = 'Transferencia';
  const fpm = all.match(/(?:FORMA\s+DE\s+PAGO|MEDIO\s+PAGO)\s*:?\s*(\w+)/i);
  if (fpm) {
    const k = fpm[1].toLowerCase();
    if (k.includes('efect')) formaPago = 'Efectivo';
    else if (k.includes('transf')) formaPago = 'Transferencia';
    else if (k.includes('tarj') || k.includes('cred') || k.includes('deb')) formaPago = 'Tarjeta';
  }

  // ── DESCRIPCIÓN ────────────────────────────────────────────
  let descripcion = null;
  const dm = all.match(/(?:CONCEPTO|DESCRIPCI[OÓ]N|SERVICIO|PRODUCTO|DETALLE)\s*:?\s*([^\n]{4,60})/i);
  if (dm) descripcion = dm[1].trim().slice(0, 60);
  if (!descripcion && proveedor) descripcion = `Compra - ${proveedor}`.slice(0, 60);

  // ── MODO PAGO ──────────────────────────────────────────────
  if (mode === 'pago') {
    let concepto = null, referencia = null, tipo = 'Anticipo';
    const cm = all.match(/(?:CONCEPTO|MOTIVO|DESCRIPCI[OÓ]N)\s*:?\s*([^\n]{4,60})/i);
    if (cm) concepto = cm[1].trim().slice(0, 60);
    const rm = all.match(/(?:REFERENCIA|REF\.?|COMPROBANTE|TRANSACCI[OÓ]N|No\.?)\s*:?\s*([A-Z0-9\-]{4,30})/i);
    if (rm) referencia = rm[1];
    if (/\bancipo\b/i.test(all)) tipo = 'Anticipo';
    else if (/pago\s+final/i.test(all)) tipo = 'Pago final';
    else if (/\babono\b/i.test(all)) tipo = 'Abono';
    return { fecha, concepto: concepto || descripcion, referencia, tipo, valor: valorTotal };
  }

  return { fecha, proveedor, factura, descripcion, valorTotal, valorSubtotal, iva, formaPago };
};

// ── COMPONENTE ANALIZAR DOCUMENTO ────────────────────────────
const AnalyzeBtn = ({ onResult, mode = 'gasto' }) => {
  const [status, setStatus] = useState('idle');
  const [progress, setProgress] = useState(0);
  const [msg, setMsg] = useState('');
  const [preview, setPreview] = useState(null);
  const fileRef = useRef();

  const handle = async (file) => {
    if (!file) return;
    // Show preview
    const objUrl = URL.createObjectURL(file);
    setPreview({ url: objUrl, type: file.type, name: file.name });
    setStatus('loading'); setProgress(0); setMsg('Cargando...');

    try {
      let text = '';

      if (file.type === 'application/pdf') {
        // Step 1: Try direct text extraction
        setMsg('Extrayendo texto del PDF...');
        try {
          text = await extractPdfText(file);
          const wordCount = text.trim().split(/\s+/).filter(w => w.length > 1).length;
          if (wordCount < 15) throw new Error('PDF escaneado');
          setMsg('Texto extraído. Analizando...');
        } catch {
          // Step 2: Render to image and OCR
          setMsg('PDF escaneado detectado. Iniciando OCR (puede tardar)...');
          const imgBlob = await renderPdfToImage(file);
          text = await runOCR(imgBlob, p => { setProgress(p); setMsg(`Leyendo PDF: ${p}%`); });
        }
      } else {
        // Image file
        setMsg('Iniciando lectura (primera vez ~30 seg, descarga idioma español)...');
        text = await runOCR(file, p => { setProgress(p); setMsg(`Leyendo imagen: ${p}%`); });
      }

      setMsg('Interpretando campos...');
      const result = parseDocText(text, mode);

      // Auto-apply result
      onResult(result);
      setStatus('done');
      setMsg(`✅ Campos completados — revisa y ajusta si es necesario`);
    } catch (e) {
      setStatus('error');
      setMsg(e.message);
    }
    if (fileRef.current) fileRef.current.value = '';
  };

  const reset = () => { setStatus('idle'); setMsg(''); setProgress(0); if (preview) { URL.revokeObjectURL(preview.url); setPreview(null); } };

  return (
    <div style={{ marginBottom: 8 }}>
      <input ref={fileRef} type="file" accept="image/*,application/pdf" style={{ display: 'none' }}
        onChange={e => handle(e.target.files[0])} />

      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: preview ? 10 : 0 }}>
        <button
          onClick={() => { if (status === 'loading') return; reset(); setTimeout(() => fileRef.current?.click(), 10); }}
          disabled={status === 'loading'}
          style={{
            display: 'flex', alignItems: 'center', gap: 6, padding: '7px 14px',
            background: status === 'done' ? '#16a34a' : status === 'error' ? '#dc2626' : '#16a34a',
            border: 'none', borderRadius: 6, color: '#fff', fontSize: 12, fontWeight: 700,
            cursor: status === 'loading' ? 'not-allowed' : 'pointer', opacity: status === 'loading' ? 0.6 : 1,
            boxShadow: '0 1px 3px rgba(0,0,0,0.15)'
          }}>
          {status === 'loading' ? '⏳ Leyendo...' : status === 'done' ? '✅ Listo — subir otro' : status === 'error' ? '❌ Reintentar' : '🔍 Leer Factura / Recibo'}
        </button>
        {status !== 'idle' && <button onClick={reset} style={{ fontSize: 11, background: 'none', border: '1px solid #cbd5e1', borderRadius: 5, color: '#64748b', padding: '4px 8px', cursor: 'pointer' }}>✕ Limpiar</button>}
        <span style={{ fontSize: 10, color: '#94a3b8', fontStyle: 'italic' }}>Sin API · 100% local · Gratis</span>
      </div>

      {status === 'loading' && (
        <div style={{ background: '#f1f5f9', border: '1px solid #e2e8f0', borderRadius: 6, padding: '8px 12px', marginTop: 6 }}>
          <div style={{ fontSize: 12, color: '#475569', marginBottom: progress > 0 ? 6 : 0 }}>{msg}</div>
          {progress > 0 && (
            <div style={{ height: 6, background: '#e2e8f0', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', background: '#16a34a', width: `${progress}%`, transition: 'width .3s' }} />
            </div>
          )}
        </div>
      )}

      {status === 'done' && (
        <div style={{ background: '#f0fdf4', border: '1px solid #bbf7d0', borderRadius: 6, padding: '7px 12px', marginTop: 6, fontSize: 12, color: '#15803d' }}>{msg}</div>
      )}
      {status === 'error' && (
        <div style={{ background: '#fef2f2', border: '1px solid #fecaca', borderRadius: 6, padding: '7px 12px', marginTop: 6, fontSize: 12, color: '#dc2626' }}>
          ❌ {msg}<br /><span style={{ fontSize: 11, color: '#64748b' }}>Verifica que el archivo sea claro y estés conectado a internet la primera vez.</span>
        </div>
      )}

      {preview && (
        <div style={{ marginTop: 8, border: '1px solid #e2e8f0', borderRadius: 6, overflow: 'hidden', maxWidth: 320 }}>
          <div style={{ background: '#f8fafc', padding: '4px 8px', fontSize: 11, color: '#64748b', display: 'flex', justifyContent: 'space-between' }}>
            <span>📎 {preview.name}</span>
            <button onClick={reset} style={{ background: 'none', border: 'none', color: '#94a3b8', cursor: 'pointer', fontSize: 12 }}>✕</button>
          </div>
          {preview.type.startsWith('image/') && (
            <img src={preview.url} alt="preview" style={{ width: '100%', maxHeight: 180, objectFit: 'contain', background: '#fff', display: 'block' }} />
          )}
          {preview.type === 'application/pdf' && (
            <div style={{ padding: 12, textAlign: 'center', color: '#475569', fontSize: 12 }}>📄 PDF adjunto</div>
          )}
        </div>
      )}
    </div>
  );
};

  const saveOT=()=>{
    const ot={...form,subtotal,totalDeducciones:totalDed,neto};
    if(selected){onChange(ots.map(o=>o.id===selected?ot:o));}
    else{onChange([...ots,ot]);}
    setView('list');setSelected(null);setForm(blank());
  };
  const delOT=id=>{if(!confirm('¿Eliminar OT?'))return;onChange(ots.filter(o=>o.id!==id))};
  const editOT=ot=>{setForm(JSON.parse(JSON.stringify(ot)));setSelected(ot.id);setView('form')};

  const addItem=()=>setForm(f=>({...f,items:[...f.items,{id:uid(),desc:'',unidad:'jornal',cant:'',vUnit:'',vTotal:''}]}));
  const updItem=(id,k,v)=>setForm(f=>({...f,items:f.items.map(it=>it.id===id?{...it,[k]:v}:it)}));
  const delItem=id=>setForm(f=>({...f,items:f.items.filter(it=>it.id!==id)}));
  const addDed=()=>setForm(f=>({...f,deducciones:[...f.deducciones,{id:uid(),concepto:'',valor:''}]}));
  const updDed=(id,k,v)=>setForm(f=>({...f,deducciones:f.deducciones.map(d=>d.id===id?{...d,[k]:v}:d)}));
  const delDed=id=>setForm(f=>({...f,deducciones:f.deducciones.filter(d=>d.id!==id)}));

  const importExcel=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf);
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    // Parse common OT structure
    const ot=blank();
    ot.numero=file.name.replace('.xlsx','').replace('O.T. ','').split(' ')[0]||'';
    rows.forEach((row,i)=>{
      const r0=String(row[0]||'').trim().toUpperCase();
      const r1=String(row[1]||'').trim();
      if(r0.includes('TRABAJADOR')||r0.includes('NOMBRE'))ot.trabajador.nombre=r1||ot.trabajador.nombre;
      if(r0.includes('CÉDULA')||r0.includes('CEDULA')||r0.includes('C.C'))ot.trabajador.cc=r1||ot.trabajador.cc;
      if(r0.includes('CARGO'))ot.trabajador.cargo=r1||ot.trabajador.cargo;
      if(r0.includes('PERÍODO')||r0.includes('PERIODO')||r0.includes('DESDE'))ot.periodo.inicio=r1||ot.periodo.inicio;
      if(r0.includes('HASTA')||r0.includes('AL'))ot.periodo.fin=r1||ot.periodo.fin;
      // Try to detect item rows (has numeric values in cols 4,5,6)
      if(row[3]&&!isNaN(+row[3])&&row[4]&&!isNaN(+row[4])&&i>5){
        ot.items.push({id:uid(),desc:String(row[1]||row[0]||'').trim(),unidad:String(row[2]||'jornal').trim(),cant:+row[3],vUnit:+row[4],vTotal:+row[5]||+row[3]*+row[4]});
      }
    });
    if(ot.items.length===0)ot.items=[{id:uid(),desc:'',unidad:'jornal',cant:'',vUnit:'',vTotal:''}];
    setForm(ot);setSelected(null);setView('form');
    e.target.value='';
  };

  // DETAIL VIEW
  if(view==='detail'&&selected){
    const ot=ots.find(o=>o.id===selected);
    if(!ot)return setView('list');
    const otFiles=files[ot.id]||[];
    return(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn-ghost" onClick={()=>setView('list')}>← Volver</button>
          <button className="btn-sm" onClick={()=>editOT(ot)}>✏️ Editar</button>
          <span style={{fontWeight:700,fontSize:15,color:'#1e293b',flex:1}}>OT #{ot.numero} — {ot.trabajador.nombre}</span>
          <span className={ot.estado==='Pagado'?'ok':ot.estado==='Parcial'?'warn':'none'}>{ot.estado}</span>
        </div>
        <div className="card" style={{padding:16}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:12}}>
            {[['Trabajador',ot.trabajador.nombre],['CC/NIT',ot.trabajador.cc],['Cargo',ot.trabajador.cargo],
              ['EPS',ot.trabajador.eps],['ARL',ot.trabajador.arl],['Período',`${ot.periodo.inicio} → ${ot.periodo.fin}`],
              ['Banco',ot.trabajador.banco],['Cuenta',ot.trabajador.cuenta],['Fecha OT',ot.fecha]
            ].map(([k,v])=><div key={k}><div style={{fontSize:10,color:'#94a3b8'}}>{k}</div><div style={{fontSize:13,fontWeight:500}}>{v||'—'}</div></div>)}
          </div>
          <div className="sec">Actividades Realizadas</div>
          <table style={{width:'100%',borderCollapse:'collapse',marginBottom:12}}>
            <thead><tr><th>Descripción</th><th>Unidad</th><th style={{textAlign:'right'}}>Cantidad</th><th style={{textAlign:'right'}}>V. Unitario</th><th style={{textAlign:'right'}}>V. Total</th></tr></thead>
            <tbody>{ot.items.map((it,i)=>(
              <tr key={it.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}>
                <td>{it.desc}</td><td style={{color:'#94a3b8'}}>{it.unidad}</td>
                <td style={{textAlign:'right'}}>{num(it.cant)}</td>
                <td style={{textAlign:'right'}}>{cop(it.vUnit)}</td>
                <td style={{textAlign:'right',fontWeight:600,color:'#e67e22'}}>{cop(+it.cant*+it.vUnit||+it.vTotal)}</td>
              </tr>
            ))}</tbody>
            <tfoot>
              <tr style={{borderTop:'1px solid #e2e8f0'}}><td colSpan={4} style={{textAlign:'right',fontWeight:700,padding:'8px 10px'}}>SUBTOTAL</td><td style={{textAlign:'right',fontWeight:700,color:'#e67e22'}}>{cop(ot.subtotal)}</td></tr>
              {(ot.deducciones||[]).map(d=><tr key={d.id}><td colSpan={4} style={{textAlign:'right',color:'#e74c3c',padding:'4px 10px'}}>(-) {d.concepto}</td><td style={{textAlign:'right',color:'#e74c3c'}}>{cop(d.valor)}</td></tr>)}
              <tr style={{borderTop:'2px solid #e67e22',background:'#eff6ff'}}><td colSpan={4} style={{textAlign:'right',fontWeight:700,padding:'8px 10px',color:'#1e293b'}}>TOTAL NETO A PAGAR</td><td style={{textAlign:'right',fontWeight:700,color:'#2ecc71',fontSize:15}}>{cop(ot.neto)}</td></tr>
            </tfoot>
          </table>
          {ot.notas&&<div style={{fontSize:13,color:'#94a3b8',padding:'8px 12px',background:'#f1f5f9',borderRadius:6}}>📝 {ot.notas}</div>}
          {ot.fechaPago&&<div style={{marginTop:8,fontSize:13,color:'#94a3b8'}}>Pagado: {ot.fechaPago} · {ot.formaPago} · Recibo: {ot.recibo||'—'}</div>}
        </div>
        <div className="card" style={{padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div className="sec" style={{marginBottom:0}}>Documentos Adjuntos ({otFiles.length})</div>
            <UploadBtn projectId={projectId} type="ot" meta={{otId:ot.id}} multiple onUploaded={recs=>{setFiles(prev=>({...prev,[ot.id]:[...(prev[ot.id]||[]),...recs]}))}} label="📎 Adjuntar"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
            {otFiles.map(f=><FileThumb key={f.id} file={f} onDelete={async()=>{await dbDelete(f.id);setFiles(prev=>({...prev,[ot.id]:(prev[ot.id]||[]).filter(x=>x.id!==f.id)}))}}/>)}
          </div>
          {otFiles.length===0&&<div style={{textAlign:'center',color:'#94a3b8',padding:16,fontSize:13}}>Sin documentos adjuntos</div>}
        </div>
      </div>
    );
  }

  // FORM VIEW
  if(view==='form') return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button className="btn-ghost" onClick={()=>{setView('list');setSelected(null);setForm(blank())}}>← Volver</button>
        <span style={{fontWeight:700,fontSize:14,flex:1}}>{selected?'Editar OT':'Nueva OT'}</span>
        <label className="btn-ghost" style={{cursor:'pointer',fontSize:12}}>📥 Importar Excel<input type="file" accept=".xlsx,.xls" onChange={importExcel} style={{display:'none'}}/></label>
      </div>
      <div className="card" style={{padding:16}}>
        <div className="sec">Datos Generales</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Inp label="N° OT" val={form.numero} set={v=>sf('numero',v)} ph="252-25"/>
          <Inp label="Fecha" type="date" val={form.fecha} set={v=>sf('fecha',v)}/>
          <Sel label="Estado" val={form.estado} set={v=>sf('estado',v)} opts={ESTADO_OT}/>
        </div>
      </div>
      <div className="card" style={{padding:16}}>
        <div className="sec">Trabajador</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Inp label="Nombre completo" val={form.trabajador.nombre} set={v=>sf('trabajador.nombre',v)} wide/>
          <Inp label="Cédula / CC" val={form.trabajador.cc} set={v=>sf('trabajador.cc',v)}/>
          <Sel label="Cargo" val={form.trabajador.cargo} set={v=>sf('trabajador.cargo',v)} opts={CARGOS}/>
          <Inp label="EPS" val={form.trabajador.eps} set={v=>sf('trabajador.eps',v)}/>
          <Inp label="ARL" val={form.trabajador.arl} set={v=>sf('trabajador.arl',v)}/>
          <Inp label="Banco" val={form.trabajador.banco} set={v=>sf('trabajador.banco',v)}/>
          <Inp label="N° Cuenta" val={form.trabajador.cuenta} set={v=>sf('trabajador.cuenta',v)}/>
          <Inp label="Período — Inicio" type="date" val={form.periodo.inicio} set={v=>sf('periodo.inicio',v)}/>
          <Inp label="Período — Fin" type="date" val={form.periodo.fin} set={v=>sf('periodo.fin',v)}/>
        </div>
      </div>
      <div className="card" style={{padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="sec" style={{marginBottom:0}}>Actividades / Conceptos</div>
          <button className="btn-sm" onClick={addItem}>+ Agregar</button>
        </div>
        <table style={{width:'100%',borderCollapse:'collapse',marginBottom:8}}>
          <thead><tr><th>Descripción</th><th style={{width:100}}>Unidad</th><th style={{width:90,textAlign:'right'}}>Cant.</th><th style={{width:130,textAlign:'right'}}>V. Unitario</th><th style={{width:130,textAlign:'right'}}>V. Total</th><th style={{width:40}}></th></tr></thead>
          <tbody>{form.items.map((it,i)=>(
            <tr key={it.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}>
              <td><input value={it.desc} onChange={e=>updItem(it.id,'desc',e.target.value)} className="inp" placeholder="Descripción actividad"/></td>
              <td><input value={it.unidad} onChange={e=>updItem(it.id,'unidad',e.target.value)} className="inp" placeholder="jornal"/></td>
              <td><input type="number" value={it.cant} onChange={e=>updItem(it.id,'cant',e.target.value)} className="inp" style={{textAlign:'right'}}/></td>
              <td><input type="number" value={it.vUnit} onChange={e=>updItem(it.id,'vUnit',e.target.value)} className="inp" style={{textAlign:'right'}}/></td>
              <td style={{textAlign:'right',fontWeight:600,color:'#e67e22'}}>{cop(+it.cant*+it.vUnit||0)}</td>
              <td><button onClick={()=>delItem(it.id)} className="btn-del">🗑</button></td>
            </tr>
          ))}</tbody>
        </table>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div className="sec" style={{marginBottom:0}}>Deducciones</div>
          <button className="btn-sm" style={{background:'#4d0000',color:'#e74c3c',border:'1px solid #e74c3c'}} onClick={addDed}>+ Deducción</button>
        </div>
        {form.deducciones.map((d,i)=>(
          <div key={d.id} style={{display:'grid',gridTemplateColumns:'1fr 130px auto',gap:8,marginBottom:6,alignItems:'end'}}>
            <input value={d.concepto} onChange={e=>updDed(d.id,'concepto',e.target.value)} className="inp" placeholder="Ej: Salud 4%, Pensión 4%..."/>
            <input type="number" value={d.valor} onChange={e=>updDed(d.id,'valor',e.target.value)} className="inp" placeholder="Valor ($)" style={{textAlign:'right'}}/>
            <button onClick={()=>delDed(d.id)} className="btn-del">🗑</button>
          </div>
        ))}
        <div style={{display:'flex',flexDirection:'column',gap:4,alignItems:'flex-end',marginTop:8,padding:'10px 12px',background:'#f1f5f9',borderRadius:6}}>
          <div style={{fontSize:13,color:'#94a3b8'}}>Subtotal: <strong style={{color:'#e67e22'}}>{cop(subtotal)}</strong></div>
          {totalDed>0&&<div style={{fontSize:13,color:'#e74c3c'}}>Deducciones: <strong>({cop(totalDed)})</strong></div>}
          <div style={{fontSize:15,fontWeight:700,color:'#2ecc71'}}>NETO A PAGAR: {cop(neto)}</div>
        </div>
      </div>
      <div className="card" style={{padding:16}}>
        <div className="sec">Pago</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Inp label="Fecha de Pago" type="date" val={form.fechaPago} set={v=>sf('fechaPago',v)}/>
          <Sel label="Forma de Pago" val={form.formaPago} set={v=>sf('formaPago',v)} opts={['','Efectivo','Transferencia','Nequi','Daviplata','Cheque']}/>
          <Inp label="N° Recibo / Comprobante" val={form.recibo} set={v=>sf('recibo',v)}/>
        </div>
      </div>
      <div className="card" style={{padding:16}}>
        <Inp label="Notas" val={form.notas} set={v=>sf('notas',v)} rows={2} ph="Observaciones adicionales..."/>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn" onClick={saveOT}>💾 Guardar OT</button>
        <button className="btn-ghost" onClick={()=>{setView('list');setSelected(null);setForm(blank())}}>Cancelar</button>
      </div>
    </div>
  );

  // LIST VIEW
  const totNeto=ots.reduce((s,o)=>s+(+o.neto||0),0);
  const totPagado=ots.filter(o=>o.estado==='Pagado').reduce((s,o)=>s+(+o.neto||0),0);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
        <Kpi label="Total OTs" val={ots.length} icon="📋"/>
        <Kpi label="Total a Pagar" val={cop(totNeto)} icon="💵"/>
        <Kpi label="Total Pagado" val={cop(totPagado)} color="#2ecc71" icon="✅"/>
        <Kpi label="Pendiente" val={cop(totNeto-totPagado)} color="#f39c12" icon="⏳"/>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8}}>
        <button className="btn" onClick={()=>{setForm(blank());setSelected(null);setView('form')}}>+ Nueva OT</button>
      </div>
      <div className="card" style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr><th>N° OT</th><th>Fecha</th><th>Trabajador</th><th>Cargo</th><th>Período</th><th style={{textAlign:'right'}}>Subtotal</th><th style={{textAlign:'right'}}>Neto</th><th>Estado</th><th>Pago</th><th></th></tr></thead>
          <tbody>{ots.length===0?<tr><td colSpan={10} style={{textAlign:'center',color:'#94a3b8',padding:24}}>No hay OTs. Crea la primera arriba.</td></tr>:ots.map((o,i)=>(
            <tr key={o.id} style={{background:i%2===0?'#1a2332':'#1e2d3d',cursor:'pointer'}} onClick={()=>{setSelected(o.id);setView('detail')}}>
              <td style={{fontWeight:600,color:'#60a5fa'}}>{o.numero||'—'}</td>
              <td style={{color:'#94a3b8',fontSize:12}}>{o.fecha}</td>
              <td style={{fontWeight:500}}>{o.trabajador.nombre}</td>
              <td><span className="none">{o.trabajador.cargo}</span></td>
              <td style={{color:'#94a3b8',fontSize:12}}>{o.periodo.inicio&&o.periodo.fin?`${o.periodo.inicio} → ${o.periodo.fin}`:o.periodo.inicio||'—'}</td>
              <td style={{textAlign:'right',color:'#94a3b8'}}>{cop(o.subtotal)}</td>
              <td style={{textAlign:'right',fontWeight:600,color:'#e67e22'}}>{cop(o.neto)}</td>
              <td onClick={e=>e.stopPropagation()}>
                <select value={o.estado} onChange={e=>onChange(ots.map(x=>x.id===o.id?{...x,estado:e.target.value}:x))}
                  className={o.estado==='Pagado'?'ok':o.estado==='Parcial'?'warn':'none'}
                  style={{background:'transparent',border:'none',cursor:'pointer',fontWeight:600,fontSize:11}}>
                  {ESTADO_OT.map(s=><option key={s}>{s}</option>)}
                </select>
              </td>
              <td style={{color:'#94a3b8',fontSize:12}}>{o.fechaPago||'—'}</td>
              <td onClick={e=>e.stopPropagation()} style={{whiteSpace:'nowrap'}}>
                <button onClick={()=>{setForm(JSON.parse(JSON.stringify(o)));setSelected(o.id);setView('form')}} className="btn-del">✏️</button>
                <button onClick={()=>delOT(o.id)} className="btn-del">🗑</button>
              </td>
            </tr>
          ))}</tbody>
          {ots.length>0&&<tfoot><tr style={{borderTop:'2px solid #e67e22',background:'#ffffff'}}>
            <td colSpan={5} style={{textAlign:'right',fontWeight:700,padding:10}}>TOTALES</td>
            <td style={{textAlign:'right',fontWeight:600,color:'#94a3b8'}}></td>
            <td style={{textAlign:'right',fontWeight:700,color:'#e67e22',fontSize:14}}>{cop(totNeto)}</td>
            <td colSpan={3}></td>
          </tr></tfoot>}
        </table>
      </div>
    </div>
  );
};

// ── FILE THUMBNAIL ────────────────────────────────────────────
const FileThumb=({file,onDelete,onView})=>{
  const [viewing,setViewing]=useState(false);
  const isImg=file.mime&&file.mime.startsWith('image');
  return(<>
    {viewing&&<FileViewer fileId={file.id} onClose={()=>setViewing(false)}/>}
    <div style={{background:'#f1f5f9',borderRadius:6,overflow:'hidden',border:'1px solid #e2e8f0',cursor:'pointer'}} onClick={()=>setViewing(true)}>
      {isImg?<img src={file.data||''} alt={file.name} style={{width:'100%',height:80,objectFit:'cover'}} onError={async()=>{const r=await dbGet(file.id);if(r){}}}/>
        :<div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>{file.mime==='application/pdf'?'📄':'📎'}</div>}
      <div style={{padding:'4px 6px'}}>
        <div style={{fontSize:11,color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{file.name}</div>
        <div style={{fontSize:10,color:'#94a3b8'}}>{fmtSize(file.size)}</div>
      </div>
      {onDelete&&<button onClick={e=>{e.stopPropagation();onDelete()}} className="btn-del" style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,.6)',borderRadius:3}}>✕</button>}
    </div>
  </>);
};

// ── FILE THUMB LAZY (loads from DB) ───────────────────────────
const FileThumbDB=({fileId,onDelete})=>{
  const [file,setFile]=useState(null);
  const [viewing,setViewing]=useState(false);
  useEffect(()=>{dbGet(fileId).then(setFile)},[fileId]);
  if(!file)return<div style={{background:'#f1f5f9',borderRadius:6,height:100,display:'flex',alignItems:'center',justifyContent:'center',color:'#94a3b8',fontSize:20}}>⏳</div>;
  const isImg=file.mime&&file.mime.startsWith('image');
  return(<>
    {viewing&&<FileViewer fileId={fileId} onClose={()=>setViewing(false)}/>}
    <div style={{background:'#f1f5f9',borderRadius:6,overflow:'hidden',border:'1px solid #e2e8f0',cursor:'pointer',position:'relative'}} onClick={()=>setViewing(true)}>
      {isImg?<img src={file.data} alt={file.name} style={{width:'100%',height:80,objectFit:'cover'}}/>
        :<div style={{height:80,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>{file.mime==='application/pdf'?'📄':'📎'}</div>}
      <div style={{padding:'4px 6px'}}>
        <div style={{fontSize:11,color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{file.name}</div>
        <div style={{fontSize:10,color:'#94a3b8'}}>{fmtSize(file.size)}</div>
      </div>
      {onDelete&&<button onClick={e=>{e.stopPropagation();onDelete()}} className="btn-del" style={{position:'absolute',top:2,right:2,background:'rgba(0,0,0,.7)',borderRadius:3,padding:'1px 5px'}}>✕</button>}
    </div>
  </>);
};

// ── CONTRATOS TAB ─────────────────────────────────────────────
const TIPOS_CONTRATO=['Laboral','Prestación de Servicios','Obra y Labor','Suministro','Subcontrato','Otro'];
const ESTADO_CONTRATO=['Vigente','Vencido','En revisión','Suspendido','Finalizado'];

const ContratosTab=({contratos,onChange,projectId})=>{
  const [dbFiles,setDbFiles]=useState([]);
  const [showForm,setShowForm]=useState(false);
  const [viewing,setViewing]=useState(null);
  const blank=()=>({id:uid(),nombre:'',tipo:'Prestación de Servicios',contratista:'',cc:'',valor:'',inicio:'',fin:'',objeto:'',estado:'Vigente',notas:'',fileIds:[]});
  const [form,setForm]=useState(blank());

  useEffect(()=>{if(projectId)dbGetByProject(projectId).then(all=>setDbFiles(all.filter(f=>f.type==='contrato')))},[projectId,contratos]);

  const save=()=>{
    if(!form.nombre&&!form.contratista)return;
    if(contratos.find(c=>c.id===form.id))onChange(contratos.map(c=>c.id===form.id?form:c));
    else onChange([...contratos,form]);
    setShowForm(false);setForm(blank());
  };
  const del=id=>{if(!confirm('¿Eliminar contrato?'))return;onChange(contratos.filter(c=>c.id!==id))};

  return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {viewing&&<FileViewer fileId={viewing} onClose={()=>setViewing(null)}/>}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

const ESTADOS_ACTA=['Borrador','Aprobada','Firmada','Anulada'];
const UNIDADES_ACTA=['m²','m³','ml','und','gl','kg','hr','día','mes'];

const ActasTab=({actas,onChange,proyecto})=>{
  const [view,setView]=useState('list');
  const [selected,setSelected]=useState(null);
  const blankItem=()=>({id:uid(),ref:'',desc:'',unidad:'m²',cant:'',vUnit:'',vTotal:0});
  const blank=()=>({id:uid(),numero:'',fecha:tod(),periodoDesde:'',periodoHasta:'',
    descripcion:'',mayores:[blankItem()],menores:[blankItem()],
    observaciones:'',firmaContratante:proyecto?.cliente||'',
    firmaContratista:'SEKA Studio S.A.S.',firmaInterventor:'',estado:'Borrador'});
  const [form,setForm]=useState(blank());

  const calcVT=(items)=>items.reduce((s,i)=>{
    const v=parseFloat(i.cant||0)*parseFloat(i.vUnit||0);return s+v;},0);
  const calcItem=(item)=>{const v=parseFloat(item.cant||0)*parseFloat(item.vUnit||0);return{...item,vTotal:v};};
  const updateItems=(field,idx,key,val,items)=>{
    const arr=items.map((it,i)=>{if(i!==idx)return it;const upd={...it,[key]:val};return key==='cant'||key==='vUnit'?calcItem(upd):upd;});
    setForm(f=>({...f,[field]:arr}));
  };
  const addItem=(field)=>setForm(f=>({...f,[field]:[...f[field],blankItem()]}));
  const removeItem=(field,idx)=>setForm(f=>({...f,[field]:f[field].filter((_,i)=>i!==idx)}));

  const save=()=>{
    if(!form.numero){alert('Ingresa el número de acta');return;}
    if(actas.find(x=>x.id===form.id))onChange(actas.map(x=>x.id===form.id?form:x));
    else onChange([...actas,form]);
    setView('list');setForm(blank());setSelected(null);
  };
  const del=id=>{if(!confirm('¿Eliminar acta?'))return;onChange(actas.filter(x=>x.id!==id))};

  // ── DETAIL / PRINT VIEW ─────────────────────────────────────
  if(view==='detail'&&selected){
    const ac=actas.find(x=>x.id===selected);if(!ac)return setView('list');
    const totalMayores=calcVT(ac.mayores);
    const totalMenores=calcVT(ac.menores);
    const valorNeto=totalMayores-totalMenores;
    const valorOriginal=parseFloat(proyecto?.valorContrato||0);
    const valorNuevo=valorOriginal+valorNeto;
    const stCol={color:ac.estado==='Aprobada'||ac.estado==='Firmada'?'#2ecc71':ac.estado==='Anulada'?'#e74c3c':'#f39c12'};
    return(
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div className="noprint" style={{display:'flex',gap:8,alignItems:'center'}}>
          <button className="btn-ghost" onClick={()=>setView('list')}>← Volver</button>
          <button className="btn-sm" onClick={()=>{setForm(JSON.parse(JSON.stringify(ac)));setSelected(ac.id);setView('form')}}>✏️ Editar</button>
          <button className="btn-sm" style={{background:'#f8fafc',border:'1px solid #e2e8f0'}} onClick={()=>window.print()}>🖨 Imprimir</button>
          <span style={{flex:1,fontWeight:700,fontSize:14}}>Acta N° {ac.numero}</span>
          <span style={{padding:'2px 10px',borderRadius:12,fontSize:12,background:'#f1f5f9',border:'1px solid #e2e8f0',...stCol}}>{ac.estado}</span>
        </div>

        {/* ── PRINT-READY DOCUMENT ── */}
        <div className="card" style={{padding:28,background:'#fff',color:'#111',fontFamily:'Arial,sans-serif'}}>
          {/* Header */}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',borderBottom:'3px solid #0f1923',paddingBottom:14,marginBottom:18}}>
            <div><SekaLogo w={150}/></div>
            <div style={{textAlign:'right'}}>
              <div style={{fontWeight:900,fontSize:17,color:'#0f1923',textTransform:'uppercase',letterSpacing:1}}>Acta de Mayores y Menores Cantidades</div>
              <div style={{fontSize:13,fontWeight:700,color:'#e67e22',marginTop:4}}>ACTA N° {ac.numero}</div>
              <div style={{fontSize:12,color:'#333',marginTop:2}}>Fecha: {ac.fecha}</div>
            </div>
          </div>

          {/* Project Info Box */}
          <div style={{background:'#f8f9fa',border:'1px solid #dee2e6',borderRadius:6,padding:'10px 14px',marginBottom:18,display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 20px'}}>
            {[['Proyecto',proyecto?.nombre||'—'],['Cliente',proyecto?.cliente||'—'],
              ['Período',ac.periodoDesde&&ac.periodoHasta?`${ac.periodoDesde} al ${ac.periodoHasta}`:ac.periodoDesde||'—'],
              ['Estado',ac.estado],['Contratante',ac.firmaContratante||'—'],['Contratista',ac.firmaContratista||'—']
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex',gap:6,alignItems:'flex-start'}}>
                <span style={{fontWeight:700,fontSize:11,color:'#555',minWidth:80}}>{k}:</span>
                <span style={{fontSize:11,color:'#111'}}>{v}</span>
              </div>
            ))}
          </div>

          {ac.descripcion&&<div style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f1923',textTransform:'uppercase',letterSpacing:.5,marginBottom:6,borderBottom:'1px solid #dee2e6',paddingBottom:4}}>Antecedentes</div>
            <p style={{fontSize:12,color:'#333',lineHeight:1.6,margin:0,whiteSpace:'pre-wrap'}}>{ac.descripcion}</p>
          </div>}

          {/* Mayores */}
          <div style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:12,color:'#155724',textTransform:'uppercase',letterSpacing:.5,marginBottom:8,background:'#d4edda',padding:'5px 10px',borderRadius:4,display:'flex',justifyContent:'space-between'}}>
              <span>1. Mayores Cantidades (Adiciones)</span>
              <span>Subtotal: {cop(totalMayores)}</span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{background:'#f8f9fa'}}>
                  {['Ref.','Descripción','Unid.','Cant.','V. Unitario','V. Total'].map(h=>(
                    <th key={h} style={{border:'1px solid #dee2e6',padding:'5px 7px',textAlign:h==='V. Total'||h==='V. Unitario'?'right':'left',fontWeight:700}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {ac.mayores.filter(i=>i.desc||i.cant).length===0
                  ?<tr><td colSpan={6} style={{border:'1px solid #dee2e6',padding:'8px',textAlign:'center',color:'#666',fontStyle:'italic'}}>Sin adiciones</td></tr>
                  :ac.mayores.filter(i=>i.desc||i.cant).map((it,i)=>(
                  <tr key={it.id} style={{background:i%2===0?'#fff':'#f8f9fa'}}>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',color:'#555'}}>{it.ref}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px'}}>{it.desc}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'center'}}>{it.unidad}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right'}}>{it.cant}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right'}}>{cop(parseFloat(it.vUnit||0))}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right',fontWeight:700}}>{cop(it.vTotal)}</td>
                  </tr>
                ))}
                <tr style={{background:'#d4edda'}}>
                  <td colSpan={5} style={{border:'1px solid #dee2e6',padding:'5px 7px',fontWeight:700,textAlign:'right'}}>SUBTOTAL MAYORES</td>
                  <td style={{border:'1px solid #dee2e6',padding:'5px 7px',fontWeight:700,textAlign:'right',color:'#155724'}}>{cop(totalMayores)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* Menores */}
          <div style={{marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:12,color:'#721c24',textTransform:'uppercase',letterSpacing:.5,marginBottom:8,background:'#f8d7da',padding:'5px 10px',borderRadius:4,display:'flex',justifyContent:'space-between'}}>
              <span>2. Menores Cantidades (Deducciones)</span>
              <span>Subtotal: {cop(totalMenores)}</span>
            </div>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
              <thead>
                <tr style={{background:'#f8f9fa'}}>
                  {['Ref.','Descripción','Unid.','Cant.','V. Unitario','V. Total'].map(h=>(
                    <th key={h} style={{border:'1px solid #dee2e6',padding:'5px 7px',textAlign:h==='V. Total'||h==='V. Unitario'?'right':'left',fontWeight:700}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {ac.menores.filter(i=>i.desc||i.cant).length===0
                  ?<tr><td colSpan={6} style={{border:'1px solid #dee2e6',padding:'8px',textAlign:'center',color:'#666',fontStyle:'italic'}}>Sin deducciones</td></tr>
                  :ac.menores.filter(i=>i.desc||i.cant).map((it,i)=>(
                  <tr key={it.id} style={{background:i%2===0?'#fff':'#f8f9fa'}}>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',color:'#555'}}>{it.ref}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px'}}>{it.desc}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'center'}}>{it.unidad}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right'}}>{it.cant}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right'}}>{cop(parseFloat(it.vUnit||0))}</td>
                    <td style={{border:'1px solid #dee2e6',padding:'4px 7px',textAlign:'right',fontWeight:700}}>{cop(it.vTotal)}</td>
                  </tr>
                ))}
                <tr style={{background:'#f8d7da'}}>
                  <td colSpan={5} style={{border:'1px solid #dee2e6',padding:'5px 7px',fontWeight:700,textAlign:'right'}}>SUBTOTAL MENORES</td>
                  <td style={{border:'1px solid #dee2e6',padding:'5px 7px',fontWeight:700,textAlign:'right',color:'#721c24'}}>{cop(totalMenores)}</td>
                </tr>
              </tbody>
            </table>
          </div>

          {/* Resumen Financiero */}
          <div style={{marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f1923',textTransform:'uppercase',letterSpacing:.5,marginBottom:8,background:'#e9ecef',padding:'5px 10px',borderRadius:4}}>3. Resumen Financiero</div>
            <table style={{width:'100%',maxWidth:420,borderCollapse:'collapse',fontSize:12,marginLeft:'auto'}}>
              <tbody>
                {[
                  ['Valor original del contrato',cop(valorOriginal),'#333','normal'],
                  ['(+) Mayores cantidades',cop(totalMayores),'#155724','normal'],
                  ['(−) Menores cantidades',cop(totalMenores),'#721c24','normal'],
                  ['Valor neto del acta',cop(Math.abs(valorNeto))+' ('+(valorNeto>=0?'adición':'deducción')+')',valorNeto>=0?'#155724':'#721c24','bold'],
                  ['Nuevo valor del contrato',cop(valorNuevo),'#0f1923','900'],
                ].map(([k,v,c,fw])=>(
                  <tr key={k}>
                    <td style={{padding:'5px 10px',border:'1px solid #dee2e6',fontWeight:fw==='900'?700:400,background:fw==='900'?'#0f1923':'#fff',color:fw==='900'?'#fff':'#333'}}>{k}</td>
                    <td style={{padding:'5px 10px',border:'1px solid #dee2e6',textAlign:'right',fontWeight:fw,color:fw==='900'?'#fff':c,background:fw==='900'?'#0f1923':'#fff'}}>{v}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {ac.observaciones&&<div style={{marginBottom:18}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f1923',textTransform:'uppercase',letterSpacing:.5,marginBottom:6,borderBottom:'1px solid #dee2e6',paddingBottom:4}}>4. Observaciones</div>
            <p style={{fontSize:12,color:'#333',lineHeight:1.6,margin:0,whiteSpace:'pre-wrap'}}>{ac.observaciones}</p>
          </div>}

          {/* Firmas */}
          <div style={{marginTop:30}}>
            <div style={{fontWeight:700,fontSize:12,color:'#0f1923',textTransform:'uppercase',letterSpacing:.5,marginBottom:18,borderBottom:'1px solid #dee2e6',paddingBottom:4}}>5. Firmas de Aprobación</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16}}>
              {[['Contratante',ac.firmaContratante],['Contratista / SEKA Studio',ac.firmaContratista],['Interventor / Supervisor',ac.firmaInterventor]].map(([rol,nom])=>(
                <div key={rol} style={{textAlign:'center'}}>
                  <div style={{borderBottom:'1.5px solid #0f1923',paddingBottom:4,marginBottom:6,minHeight:40}}></div>
                  <div style={{fontSize:11,fontWeight:700,color:'#0f1923'}}>{nom||'_______________'}</div>
                  <div style={{fontSize:10,color:'#555',marginTop:2}}>{rol}</div>
                  <div style={{fontSize:10,color:'#555',marginTop:2}}>C.C. _______________</div>
                  <div style={{fontSize:10,color:'#555',marginTop:2}}>Firma: _______________</div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer */}
          <div style={{marginTop:20,paddingTop:10,borderTop:'1px solid #dee2e6',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <SekaLogo w={80}/>
            <div style={{fontSize:10,color:'#666',textAlign:'right'}}>
              <div>Bogotá, {ac.fecha}</div>
              <div>Generado por SEKA Studio — Sistema de Gestión de Proyectos</div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── FORM VIEW ───────────────────────────────────────────────
  if(view==='form') return(
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button className="btn-ghost" onClick={()=>{setView('list');setForm(blank())}}>← Volver</button>
        <span style={{fontWeight:700,fontSize:14,flex:1}}>{selected?'Editar Acta':'Nueva Acta de Mayores y Menores'}</span>
        <button className="btn" onClick={save}>💾 Guardar Acta</button>
      </div>

      {/* Encabezado */}
      <div className="card" style={{padding:16}}>
        <div className="sec">Datos del Acta</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Inp label="N° de Acta *" val={form.numero} set={v=>setForm(f=>({...f,numero:v}))} ph="001"/>
          <Inp label="Fecha" type="date" val={form.fecha} set={v=>setForm(f=>({...f,fecha:v}))}/>
          <Sel label="Estado" val={form.estado} set={v=>setForm(f=>({...f,estado:v}))} opts={ESTADOS_ACTA}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:10}}>
          <Inp label="Período Desde" type="date" val={form.periodoDesde} set={v=>setForm(f=>({...f,periodoDesde:v}))}/>
          <Inp label="Período Hasta" type="date" val={form.periodoHasta} set={v=>setForm(f=>({...f,periodoHasta:v}))}/>
        </div>
        <div style={{marginTop:10}}>
          <label style={{display:'block',fontSize:11,color:'#94a3b8',marginBottom:4}}>Antecedentes / Descripción</label>
          <textarea value={form.descripcion} onChange={e=>setForm(f=>({...f,descripcion:e.target.value}))} rows={3}
            style={{width:'100%',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:6,padding:'7px 10px',color:'#1e293b',fontSize:12,resize:'vertical',boxSizing:'border-box'}}
            placeholder="Contexto del acta — por qué se generaron los cambios..."/>
        </div>
      </div>

      {/* Mayores */}
      <div className="card" style={{padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="sec" style={{margin:0}}>Mayores Cantidades (Adiciones) — Subtotal: <span style={{color:'#2ecc71'}}>{cop(calcVT(form.mayores))}</span></div>
          <button className="btn-sm" onClick={()=>addItem('mayores')}>+ Ítem</button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{background:'#f1f5f9'}}>
              {['Ref.','Descripción','Unid.','Cant.','V. Unitario','V. Total',''].map(h=>(
                <th key={h} style={{padding:'6px 8px',textAlign:h==='V. Total'||h==='V. Unitario'?'right':'left',color:'#94a3b8',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{form.mayores.map((it,i)=>(
              <tr key={it.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}>
                <td style={{padding:'4px 6px'}}><input value={it.ref} onChange={e=>updateItems('mayores',i,'ref',e.target.value,form.mayores)} style={{width:50,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11}}/></td>
                <td style={{padding:'4px 6px'}}><input value={it.desc} onChange={e=>updateItems('mayores',i,'desc',e.target.value,form.mayores)} style={{width:180,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11}}/></td>
                <td style={{padding:'4px 6px'}}><select value={it.unidad} onChange={e=>updateItems('mayores',i,'unidad',e.target.value,form.mayores)} style={{width:60,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 4px',color:'#1e293b',fontSize:11}}>{UNIDADES_ACTA.map(u=><option key={u}>{u}</option>)}</select></td>
                <td style={{padding:'4px 6px'}}><input type="number" value={it.cant} onChange={e=>updateItems('mayores',i,'cant',e.target.value,form.mayores)} style={{width:70,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11,textAlign:'right'}}/></td>
                <td style={{padding:'4px 6px'}}><input type="number" value={it.vUnit} onChange={e=>updateItems('mayores',i,'vUnit',e.target.value,form.mayores)} style={{width:100,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11,textAlign:'right'}}/></td>
                <td style={{padding:'4px 8px',textAlign:'right',color:'#2ecc71',fontWeight:700}}>{cop(it.vTotal)}</td>
                <td style={{padding:'4px 4px'}}><button onClick={()=>removeItem('mayores',i)} style={{background:'none',border:'none',color:'#e74c3c',cursor:'pointer',fontSize:14}}>✕</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>

      {/* Menores */}
      <div className="card" style={{padding:16}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div className="sec" style={{margin:0}}>Menores Cantidades (Deducciones) — Subtotal: <span style={{color:'#e74c3c'}}>{cop(calcVT(form.menores))}</span></div>
          <button className="btn-sm" onClick={()=>addItem('menores')}>+ Ítem</button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{background:'#f1f5f9'}}>
              {['Ref.','Descripción','Unid.','Cant.','V. Unitario','V. Total',''].map(h=>(
                <th key={h} style={{padding:'6px 8px',textAlign:h==='V. Total'||h==='V. Unitario'?'right':'left',color:'#94a3b8',fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>
              ))}
            </tr></thead>
            <tbody>{form.menores.map((it,i)=>(
              <tr key={it.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}>
                <td style={{padding:'4px 6px'}}><input value={it.ref} onChange={e=>updateItems('menores',i,'ref',e.target.value,form.menores)} style={{width:50,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11}}/></td>
                <td style={{padding:'4px 6px'}}><input value={it.desc} onChange={e=>updateItems('menores',i,'desc',e.target.value,form.menores)} style={{width:180,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11}}/></td>
                <td style={{padding:'4px 6px'}}><select value={it.unidad} onChange={e=>updateItems('menores',i,'unidad',e.target.value,form.menores)} style={{width:60,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 4px',color:'#1e293b',fontSize:11}}>{UNIDADES_ACTA.map(u=><option key={u}>{u}</option>)}</select></td>
                <td style={{padding:'4px 6px'}}><input type="number" value={it.cant} onChange={e=>updateItems('menores',i,'cant',e.target.value,form.menores)} style={{width:70,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11,textAlign:'right'}}/></td>
                <td style={{padding:'4px 6px'}}><input type="number" value={it.vUnit} onChange={e=>updateItems('menores',i,'vUnit',e.target.value,form.menores)} style={{width:100,background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:4,padding:'3px 5px',color:'#1e293b',fontSize:11,textAlign:'right'}}/></td>
                <td style={{padding:'4px 8px',textAlign:'right',color:'#e74c3c',fontWeight:700}}>{cop(it.vTotal)}</td>
                <td style={{padding:'4px 4px'}}><button onClick={()=>removeItem('menores',i)} style={{background:'none',border:'none',color:'#e74c3c',cursor:'pointer',fontSize:14}}>✕</button></td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>

      {/* Resumen + Firmas + Observaciones */}
      <div className="card" style={{padding:16}}>
        <div className="sec">Resumen Financiero</div>
        {(()=>{
          const tM=calcVT(form.mayores),tMe=calcVT(form.menores),neto=tM-tMe;
          const vo=parseFloat(proyecto?.valorContrato||0);
          return(<div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:12}}>
            <Kpi label="Valor Contrato Original" val={cop(vo)} color="#94a3b8" icon="📋"/>
            <Kpi label="Total Mayores" val={cop(tM)} color="#2ecc71" icon="↑"/>
            <Kpi label="Total Menores" val={cop(tMe)} color="#e74c3c" icon="↓"/>
            <Kpi label="Valor Neto Acta" val={cop(Math.abs(neto))} color={neto>=0?'#2ecc71':'#e74c3c'} icon={neto>=0?'⊕':'⊖'}
              sub={neto>=0?'Adición al contrato':'Deducción al contrato'}/>
          </div>);
        })()}

        <div className="sec">Firmas</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:12}}>
          <Inp label="Contratante" val={form.firmaContratante} set={v=>setForm(f=>({...f,firmaContratante:v}))} ph={proyecto?.cliente||'Nombre'}/>
          <Inp label="Contratista" val={form.firmaContratista} set={v=>setForm(f=>({...f,firmaContratista:v}))}/>
          <Inp label="Interventor / Supervisor" val={form.firmaInterventor} set={v=>setForm(f=>({...f,firmaInterventor:v}))} ph="Opcional"/>
        </div>

        <div className="sec">Observaciones</div>
        <textarea value={form.observaciones} onChange={e=>setForm(f=>({...f,observaciones:e.target.value}))} rows={3}
          style={{width:'100%',background:'#f1f5f9',border:'1px solid #e2e8f0',borderRadius:6,padding:'7px 10px',color:'#1e293b',fontSize:12,resize:'vertical',boxSizing:'border-box'}}
          placeholder="Observaciones, condiciones, acuerdos..."/>
      </div>

        <Kpi label="Total Menores" val={cop(actas.reduce((s,a)=>s+calcVT(a.menores),0))} color="#e74c3c" icon="↓"/>
        <Kpi label="Impacto Neto" val={cop(Math.abs(actas.reduce((s,a)=>s+(calcVT(a.mayores)-calcVT(a.menores)),0)))}
          color={actas.reduce((s,a)=>s+(calcVT(a.mayores)-calcVT(a.menores)),0)>=0?'#2ecc71':'#e74c3c'} icon="⇅"/>
      </div>

      {/* What is this? */}

        <div style={{fontSize:32,marginBottom:8}}>📋</div>
        <div style={{fontWeight:700,marginBottom:6}}>¿Qué son las Actas de Mayores y Menores?</div>
        <div style={{fontSize:13,color:'#94a3b8',lineHeight:1.6,maxWidth:500,margin:'0 auto'}}>
          Son documentos que formalizan los cambios al contrato original. Las <strong style={{color:'#2ecc71'}}>Mayores Cantidades</strong> son adiciones de trabajo o materiales que incrementan el valor del contrato. Las <strong style={{color:'#e74c3c'}}>Menores Cantidades</strong> son reducciones que lo disminuyen. Ambas requieren firma del contratante y contratista.
        </div>
        <button className="btn" style={{marginTop:14}} onClick={()=>{setForm(blank());setSelected(null);setView('form')}}>Crear Primera Acta</button>
      </div>}

      {actas.length>0&&<table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead><tr style={{background:'#f1f5f9'}}>
          {['N° Acta','Fecha','Período','Mayores','Menores','Neto','Estado',''].map(h=>(
            <th key={h} style={{padding:'8px 10px',textAlign:'left',color:'#94a3b8',fontWeight:600}}>{h}</th>
          ))}
        </tr></thead>
        <tbody>{actas.map((ac,i)=>{
          const tM=calcVT(ac.mayores),tMe=calcVT(ac.menores),neto=tM-tMe;

          <tr key={ac.id} style={{background:i%2===0?'#1a2332':'#1e2d3d',cursor:'pointer'}} onClick={()=>{setSelected(ac.id);setView('detail')}}>
            <td style={{padding:'8px 10px',fontWeight:700,color:'#e67e22'}}>#{ac.numero||'—'}</td>
            <td style={{padding:'8px 10px'}}>{ac.fecha}</td>
            <td style={{padding:'8px 10px',color:'#94a3b8',fontSize:11}}>{ac.periodoDesde&&ac.periodoHasta?`${ac.periodoDesde} → ${ac.periodoHasta}`:ac.periodoDesde||'—'}</td>
            <td style={{padding:'8px 10px',color:'#2ecc71',fontWeight:600}}>{cop(tM)}</td>
            <td style={{padding:'8px 10px',color:'#e74c3c',fontWeight:600}}>{cop(tMe)}</td>
            <td style={{padding:'8px 10px',fontWeight:700,color:neto>=0?'#2ecc71':'#e74c3c'}}>{neto>=0?'+':'-'}{cop(Math.abs(neto))}</td>
            <td style={{padding:'8px 10px'}}><span style={{color:stColor(ac.estado),fontWeight:600}}>{ac.estado}</span></td>
            <td style={{padding:'8px 5px'}}>
              <button onClick={e=>{e.stopPropagation();setForm(JSON.parse(JSON.stringify(ac)));setSelected(ac.id);setView('form')}} style={{background:'none',border:'none',color:'#94a3b8',cursor:'pointer',marginRight:4}}>✏️</button>
              <button onClick={e=>{e.stopPropagation();del(ac.id)}} style={{background:'none',border:'none',color:'#e74c3c',cursor:'pointer'}}>🗑</button>
            </td>
          </tr>);
        })}</tbody>
      </table>}
    </div>
  );
};
// ── GASTOS CON FACTURA ────────────────────────────────────────
const CATS=['Materiales','Mano de Obra','Honorarios Subcontratistas','Transporte','Herramientas/Equipos','Imprevistos','Administrativo','Otros'];
const FPAGOS=['Efectivo','Transferencia','Nequi','Daviplata','Cheque','Crédito 30d'];
const GastosTab=({gastos,onChange,partidas,projectId})=>{
  const [show,setShow]=useState(false);
  const [viewing,setViewing]=useState(null);
  const emptyF=()=>({fecha:tod(),partida:'',desc:'',proveedor:'',factura:'',categoria:'Materiales',formaPago:'Transferencia',valorFact:'',valorPag:'',fileId:null});
  const [f,setF]=useState(emptyF());
  const sf=(k,v)=>setF(x=>({...x,[k]:v}));
  const totF=useMemo(()=>gastos.reduce((s,g)=>s+(+g.valorFact||0),0),[gastos]);
  const totP=useMemo(()=>gastos.reduce((s,g)=>s+(+g.valorPag||0),0),[gastos]);
  const totPres=useMemo(()=>partidas.filter(p=>!p.esCapitulo).reduce((s,p)=>s+(+p.cant*+p.vUnit||0),0),[partidas]);

      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn" onClick={()=>setShow(!show)}>+ Registrar Gasto</button></div>

          <div className="sec" style={{margin:0}}>Nuevo Gasto</div>

            const fpMap={'efectivo':'Efectivo','transferencia':'Transferencia','tarjeta':'Tarjeta','crédito':'Crédito','cheque':'Cheque','débito':'Tarjeta'};
            let fp='Transferencia';
            if(r.formaPago){const k=r.formaPago.toLowerCase();for(const[p,v]of Object.entries(fpMap)){if(k.includes(p)){fp=v;break;}}}
            setF(x=>({...x,
              fecha:fd,
              proveedor:r.proveedor||x.proveedor,
              factura:r.factura||x.factura,
              desc:r.descripcion||x.desc,
              formaPago:fp,
              valorFact:r.valorTotal!=null?String(Math.round(r.valorTotal)):x.valorFact,
              valorPag:r.valorTotal!=null?String(Math.round(r.valorTotal)):x.valorPag,
            }));
          }}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Inp label="Fecha" type="date" val={f.fecha} set={v=>sf('fecha',v)}/>
          <div><label style={{display:'block',fontSize:10,color:'#94a3b8',marginBottom:3,textTransform:'uppercase'}}>Partida</label>
            <select value={f.partida} onChange={e=>sf('partida',e.target.value)} className="inp"><option value="">Sin partida</option>{items.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <Inp label="Descripción" val={f.desc} set={v=>sf('desc',v)} ph="Detalle del gasto"/>
          <Inp label="Proveedor / Contratista" val={f.proveedor} set={v=>sf('proveedor',v)}/>
          <Inp label="Factura / Referencia" val={f.factura} set={v=>sf('factura',v)}/>
          <Sel label="Categoría" val={f.categoria} set={v=>sf('categoria',v)} opts={CATS}/>
          <Sel label="Forma de Pago" val={f.formaPago} set={v=>sf('formaPago',v)} opts={FPAGOS}/>
          <Inp label="Valor Facturado ($)" type="number" val={f.valorFact} set={v=>sf('valorFact',v)} pre="$"/>
          <Inp label="Valor Pagado ($)" type="number" val={f.valorPag} set={v=>sf('valorPag',v)} pre="$"/>
        </div>
        <div style={{marginTop:10}}>
          <div style={{fontSize:10,color:'#94a3b8',marginBottom:6,textTransform:'uppercase'}}>📎 Adjuntar factura (foto o PDF)</div>
          {f.fileId?<div style={{display:'flex',gap:8,alignItems:'center',padding:'8px 12px',background:'#f1f5f9',borderRadius:6}}>
            <span style={{fontSize:13,color:'#2ecc71'}}>✅ Factura adjunta</span>
            <button className="btn-sm" onClick={()=>setViewing(f.fileId)}>Ver</button>
            <button className="btn-del" onClick={()=>sf('fileId',null)}>✕</button>
          </div>:
          <UploadBtn projectId={projectId} type="factura" accept="image/*,application/pdf" label="📷 Subir foto/PDF de factura"
            onUploaded={recs=>{if(recs[0])sf('fileId',recs[0].id)}}/>}
        </div>
        <div style={{marginTop:10,display:'flex',gap:8}}>
          <button className="btn" onClick={add}>Guardar</button>
          <button className="btn-ghost" onClick={()=>{setShow(false);setF(emptyF())}}>Cancelar</button>
        </div>
      </div>}
      <div className="card" style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse'}}>
          <thead><tr><th>#</th><th>Fecha</th><th>Partida</th><th>Descripción</th><th>Proveedor</th><th>Factura</th><th>Cat.</th><th>Pago</th><th style={{textAlign:'right'}}>Facturado</th><th style={{textAlign:'right'}}>Pagado</th><th style={{textAlign:'right'}}>%</th><th>Doc</th><th></th></tr></thead>
          <tbody>{gastos.length===0?<tr><td colSpan={13} style={{textAlign:'center',color:'#94a3b8',padding:20}}>No hay gastos</td></tr>:gastos.map((g,i)=>{
            const pp=+g.valorFact>0?+g.valorPag/+g.valorFact:null;
            return(<tr key={g.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}>
              <td style={{color:'#94a3b8'}}>{i+1}</td><td style={{color:'#94a3b8',fontSize:12}}>{g.fecha}</td>
              <td style={{color:'#94a3b8',fontSize:11}}>{g.partida?(g.partida.split('—')[0]||'').trim():'—'}</td>
              <td style={{fontWeight:500}}>{g.desc}</td><td style={{color:'#94a3b8'}}>{g.proveedor}</td>
              <td style={{color:'#94a3b8',fontSize:12}}>{g.factura}</td>

              <td><button onClick={()=>del(g.id)} className="btn-del">🗑</button></td>
            </tr>);
          })}</tbody>
          {gastos.length>0&&<tfoot><tr style={{borderTop:'2px solid #e74c3c',background:'#ffffff'}}>
            <td colSpan={8} style={{textAlign:'right',fontWeight:700,padding:10}}>TOTALES</td>
            <td style={{textAlign:'right',fontWeight:600,color:'#94a3b8'}}>{cop(totF)}</td>
            <td style={{textAlign:'right',fontWeight:700,color:'#e74c3c',fontSize:14}}>{cop(totP)}</td>

          </tr></tfoot>}
        </table>
      </div>
    </div>
  );
};

// ── BACKUP + PROJECT MANAGER (condensed) ──────────────────────
const BackupPanel=({projectId,projectName,currentData,onRestore,onClose})=>{
  const [backups,setBackups]=useState(loadBackups(projectId));
  const [label,setLabel]=useState('');const [msg,setMsg]=useState('');
  const doSave=()=>{const l=label.trim()||`Backup ${tsLabel(Date.now())}`;saveBackup(projectId,l,currentData);setBackups(loadBackups(projectId));setLabel('');setMsg('✅ Guardado');setTimeout(()=>setMsg(''),2000)};
  const doDelete=ts=>{if(!confirm('¿Eliminar?'))return;deleteBackup(projectId,ts);setBackups(loadBackups(projectId))};
  const doRestore=b=>{if(!confirm(`¿Restaurar "${b.label}"?`))return;onRestore(b.data);onClose()};
  const doExport=()=>{const bl=new Blob([JSON.stringify({project:currentData,backups,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download=`SEKA_${projectName||'proyecto'}_${tod()}.json`;a.click()};
  const fRef=useRef();
  const doImport=e=>{const fi=e.target.files[0];if(!fi)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);onRestore(d.project||d);onClose()}catch{alert('Archivo inválido')}};r.readAsText(fi)};
  return(<div className="modal"><div className="modal-box" style={{width:560}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><div style={{fontWeight:700,fontSize:15}}>💾 Backups — {projectName}</div><button className="btn-ghost" onClick={onClose} style={{padding:'3px 10px'}}>✕</button></div>
    <div style={{background:'#f1f5f9',borderRadius:8,padding:14,marginBottom:12}}>
      <div className="sec">Crear backup</div>
      <div style={{display:'flex',gap:8}}><input value={label} onChange={e=>setLabel(e.target.value)} placeholder="Nombre (opcional)" className="inp" style={{flex:1}}/><button className="btn" onClick={doSave}>💾 Guardar</button></div>
      {msg&&<div style={{marginTop:6,fontSize:12,color:'#2ecc71'}}>{msg}</div>}
    </div>
    <div style={{marginBottom:12}}>
      <div className="sec">Backups ({backups.length}/{MAX_BACKS})</div>
      {backups.length===0?<div style={{textAlign:'center',color:'#94a3b8',padding:16,fontSize:13}}>Sin backups</div>:backups.map(b=>(
        <div key={b.ts} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:'#f8fafc',borderRadius:6,marginBottom:5}}>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{b.label}</div><div style={{fontSize:11,color:'#94a3b8'}}>{tsLabel(b.ts)}</div></div>
          <button className="btn-sm" onClick={()=>doRestore(b)} style={{background:'#1a4731',color:'#2ecc71',border:'1px solid #2ecc71'}}>Restaurar</button>
          <button onClick={()=>doDelete(b.ts)} className="btn-del">🗑</button>
        </div>
      ))}
    </div>
    <div style={{background:'#f1f5f9',borderRadius:8,padding:14}}>
      <div className="sec">Exportar / Importar</div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn" onClick={doExport} style={{flex:1}}>⬇ Exportar JSON</button>
        <label className="btn-ghost" style={{flex:1,textAlign:'center',cursor:'pointer'}}>⬆ Importar JSON<input ref={fRef} type="file" accept=".json" onChange={doImport} style={{display:'none'}}/></label>
      </div>
    </div>
  </div></div>);
};

const PresupuestoTab=({partidas,onChange})=>{
