  const [nr,setNr]=useState({item:'',desc:'',unidad:'',cant:'',vUnit:'',esCapitulo:false});
  const total=useMemo(()=>partidas.filter(p=>!p.esCapitulo).reduce((s,p)=>s+(+p.cant*+p.vUnit||0),0),[partidas]);
  const upd=(id,f,v)=>onChange(partidas.map(p=>p.id===id?{...p,[f]:v}:p));
  const del=id=>onChange(partidas.filter(p=>p.id!==id));
  const add=()=>{if(!nr.desc)return;onChange([...partidas,{...nr,id:uid()}]);setNr({item:'',desc:'',unidad:'',cant:'',vUnit:'',esCapitulo:false});setShowAdd(false)};
  return(<div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><Kpi label="Total Presupuesto" val={cop(total)} icon="📊"/><button className="btn" onClick={()=>setShowAdd(!showAdd)}>+ Agregar Partida</button></div>
    {showAdd&&<div className="card" style={{padding:14,borderColor:'#e67e22'}}><div className="sec">Nueva Partida</div><div style={{display:'grid',gridTemplateColumns:'80px 1fr 80px 90px 130px 80px auto',gap:8,alignItems:'end'}}>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Ítem</label><input value={nr.item} onChange={e=>setNr({...nr,item:e.target.value})} className="inp" placeholder="1.1"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Descripción</label><input value={nr.desc} onChange={e=>setNr({...nr,desc:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Unidad</label><input value={nr.unidad} onChange={e=>setNr({...nr,unidad:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Cantidad</label><input type="number" value={nr.cant} onChange={e=>setNr({...nr,cant:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>V. Unitario</label><input type="number" value={nr.vUnit} onChange={e=>setNr({...nr,vUnit:e.target.value})} className="inp"/></div>
      <div style={{paddingTop:14}}><label style={{fontSize:10,color:'#94a3b8',display:'block'}}>Cap.</label><input type="checkbox" checked={nr.esCapitulo} onChange={e=>setNr({...nr,esCapitulo:e.target.checked})} style={{marginTop:6}}/></div>
      <div style={{paddingTop:14}}><button className="btn" onClick={add}>+</button></div>
    </div></div>}
    <div className="card" style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead><tr><th style={{width:70}}>Ítem</th><th>Descripción</th><th style={{width:70,textAlign:'center'}}>Und</th><th style={{width:85,textAlign:'right'}}>Cant.</th><th style={{width:140,textAlign:'right'}}>V. Unit.</th><th style={{width:145,textAlign:'right'}}>V. Total</th><th style={{width:65,textAlign:'right'}}>%</th><th style={{width:50}}></th></tr></thead>
        <tbody>{partidas.map((p,i)=>{const vt=+p.cant*+p.vUnit||0;const pp=total>0?vt/total:0;const isE=editId===p.id;return(
          <tr key={p.id} style={{background:p.esCapitulo?'#1a3a5c':i%2===0?'#1a2332':'#1e2d3d'}}>
            <td>{isE?<input value={p.item} onChange={e=>upd(p.id,'item',e.target.value)} className="inp" style={{width:60}}/>:<span style={{color:'#94a3b8',fontSize:12}}>{p.item}</span>}</td>
            <td>{isE?<input value={p.desc} onChange={e=>upd(p.id,'desc',e.target.value)} className="inp"/>:<span style={{fontWeight:p.esCapitulo?700:400,color:p.esCapitulo?'#60a5fa':'#e2e8f0'}}>{p.desc}</span>}</td>
            <td style={{textAlign:'center'}}>{!p.esCapitulo&&(isE?<input value={p.unidad} onChange={e=>upd(p.id,'unidad',e.target.value)} className="inp" style={{width:65,textAlign:'center'}}/>:<span style={{color:'#94a3b8',fontSize:12}}>{p.unidad}</span>)}</td>
            <td style={{textAlign:'right'}}>{!p.esCapitulo&&(isE?<input type="number" value={p.cant} onChange={e=>upd(p.id,'cant',e.target.value)} className="inp" style={{width:80,textAlign:'right'}}/>:<span style={{color:'#94a3b8'}}>{p.cant!==''?num(p.cant):'—'}</span>)}</td>
            <td style={{textAlign:'right'}}>{!p.esCapitulo&&(isE?<input type="number" value={p.vUnit} onChange={e=>upd(p.id,'vUnit',e.target.value)} className="inp" style={{width:130,textAlign:'right'}}/>:<span style={{color:'#94a3b8'}}>{p.vUnit!==''?cop(p.vUnit):'—'}</span>)}</td>
            <td style={{textAlign:'right',fontWeight:!p.esCapitulo&&vt>0?600:400,color:vt>0?'#e67e22':'#475569'}}>{!p.esCapitulo?(vt>0?cop(vt):'—'):''}</td>
            <td style={{textAlign:'right',color:'#94a3b8',fontSize:11}}>{!p.esCapitulo&&pp>0?pct(pp):''}</td>
            <td style={{textAlign:'center'}}><button onClick={()=>setEditId(isE?null:p.id)} className="btn-del">{isE?'✅':'✏️'}</button><button onClick={()=>del(p.id)} className="btn-del">🗑</button></td>
          </tr>);

        <tfoot><tr style={{background:'#ffffff',borderTop:'2px solid #e67e22'}}><td colSpan={5} style={{textAlign:'right',fontWeight:700,padding:10}}>TOTAL PRESUPUESTO</td><td style={{textAlign:'right',fontWeight:700,color:'#e67e22',fontSize:14}}>{cop(total)}</td><td style={{textAlign:'right',color:'#94a3b8',fontSize:12}}>100%</td><td></td></tr></tfoot>
      </table>
    </div>
  </div>);
};

const TIPOS_PAGO=['Anticipo','Pago Parcial','Pago Final','Pago Adicional','Devolución'];
const PagosTab=({pagos,onChange,proyecto})=>{
  const [show,setShow]=useState(false);const [f,setF]=useState({fecha:tod(),concepto:'',tipo:'Anticipo',ref:'',valor:'',valorEsp:''});
  const sf=(k,v)=>setF(x=>({...x,[k]:v}));
  const total=useMemo(()=>pagos.reduce((s,p)=>s+(+p.valor||0),0),[pagos]);
  const vc=+proyecto.valorContrato||0;
  const add=()=>{if(!f.valor)return;onChange([...pagos,{...f,id:uid()}]);setF({fecha:tod(),concepto:'',tipo:'Anticipo',ref:'',valor:'',valorEsp:''});setShow(false)};
  const del=id=>onChange(pagos.filter(p=>p.id!==id));
  const est=p=>{const v=+p.valor,ve=+p.valorEsp;if(!ve)return<span className="none">—</span>;if(v>=ve)return<span className="ok">✅</span>;if(v>0)return<span className="warn">⚠️</span>;return<span className="err">🔴</span>};
  return(<div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}><Kpi label="Total Recibido" val={cop(total)} color="#2ecc71" icon="💰"/><Kpi label="Saldo" val={cop(vc-total)} color={vc-total>0?'#f39c12':'#2ecc71'} icon="🔔"/><Kpi label="% Cobrado" val={pct(vc?total/vc:0)} icon="📊"/><Kpi label="# Pagos" val={pagos.length} icon="🧾"/></div>
    <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn" onClick={()=>setShow(!show)}>+ Registrar Pago</button></div>
    {show&&<div className="card" style={{padding:14,borderColor:'#2ecc71'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div className="sec" style={{margin:0}}>Nuevo Pago</div>
        <AnalyzeBtn mode="pago" onResult={r=>{
          if(!r)return;
          let fd=tod();
          if(r.fecha){try{const d=new Date(r.fecha);if(!isNaN(d.getTime()))fd=d.toISOString().slice(0,10);}catch{}}
          setF(x=>({...x,
            fecha:fd,
            concepto:r.concepto||x.concepto,
            tipo:r.tipo||x.tipo,
            ref:r.referencia||x.ref,
            valor:r.valor!=null?String(Math.round(r.valor)):x.valor,
          }));
        }}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}><Inp label="Fecha" type="date" val={f.fecha} set={v=>sf('fecha',v)}/><Inp label="Concepto" val={f.concepto} set={v=>sf('concepto',v)}/><Sel label="Tipo" val={f.tipo} set={v=>sf('tipo',v)} opts={TIPOS_PAGO}/><Inp label="Referencia" val={f.ref} set={v=>sf('ref',v)}/><Inp label="Valor Recibido" type="number" val={f.valor} set={v=>sf('valor',v)} pre="$"/><Inp label="Valor Esperado" type="number" val={f.valorEsp} set={v=>sf('valorEsp',v)} pre="$"/></div><div style={{marginTop:10,display:'flex',gap:8}}><button className="btn" onClick={add}>Guardar</button><button className="btn-ghost" onClick={()=>setShow(false)}>Cancelar</button></div></div>}
    <div className="card" style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr><th>#</th><th>Fecha</th><th>Concepto</th><th>Tipo</th><th>Ref.</th><th style={{textAlign:'right'}}>Recibido</th><th style={{textAlign:'right'}}>Esperado</th><th style={{textAlign:'right'}}>% Contrato</th><th style={{textAlign:'right'}}>Acumulado</th><th></th><th></th></tr></thead>
      <tbody>{pagos.length===0?<tr><td colSpan={11} style={{textAlign:'center',color:'#94a3b8',padding:20}}>Sin pagos</td></tr>:pagos.map((p,i)=>{const acum=pagos.slice(0,i+1).reduce((s,x)=>s+(+x.valor||0),0);return(
        <tr key={p.id} style={{background:i%2===0?'#1a2332':'#1e2d3d'}}><td style={{color:'#94a3b8'}}>{i+1}</td><td style={{color:'#94a3b8',fontSize:12}}>{p.fecha}</td><td style={{fontWeight:500}}>{p.concepto}</td><td><span className="none">{p.tipo}</span></td><td style={{color:'#94a3b8',fontSize:12}}>{p.ref}</td><td style={{textAlign:'right',fontWeight:600,color:'#2ecc71'}}>{cop(p.valor)}</td><td style={{textAlign:'right',color:'#94a3b8'}}>{p.valorEsp?cop(p.valorEsp):'—'}</td><td style={{textAlign:'right',color:'#94a3b8'}}>{vc?pct(+p.valor/vc):'—'}</td><td style={{textAlign:'right',color:'#e67e22'}}>{cop(acum)}</td><td>{est(p)}</td><td><button onClick={()=>del(p.id)} className="btn-del">🗑</button></td>
      </tr>);})}
      </tbody>{pagos.length>0&&<tfoot><tr style={{borderTop:'2px solid #2ecc71',background:'#ffffff'}}><td colSpan={5} style={{textAlign:'right',fontWeight:700,padding:10}}>TOTAL RECIBIDO</td><td style={{textAlign:'right',fontWeight:700,color:'#2ecc71',fontSize:14}}>{cop(total)}</td><td colSpan={5}></td></tr></tfoot>}
    </table></div>
  </div>);
};

const CronogramaTab=({actividades,onChange})=>{
  const [showAdd,setShowAdd]=useState(false);const [na,setNa]=useState({num:'',desc:'',esCapitulo:false,pct:'',fIniPlan:'',fFinPlan:'',fIniReal:'',fFinReal:''});
  const upd=(id,f,v)=>onChange(actividades.map(a=>a.id===id?{...a,[f]:v}:a));
  const del=id=>onChange(actividades.filter(a=>a.id!==id));
  const add=()=>{if(!na.desc)return;onChange([...actividades,{...na,id:uid()}]);setNa({num:'',desc:'',esCapitulo:false,pct:'',fIniPlan:'',fFinPlan:'',fIniReal:'',fFinReal:''});setShowAdd(false)};
  const nc=actividades.filter(a=>!a.esCapitulo);
  const est=a=>{const p=+a.pct;if(p>=1)return<span className="ok">✅</span>;if(a.fIniReal&&!a.fFinReal){if(a.fFinPlan&&new Date(a.fFinPlan)<new Date())return<span className="err">🔴 Atrasado</span>;return<span className="warn">🟡 En proceso</span>;}if(p>0)return<span className="warn">🟡</span>;return<span className="none">⬜</span>};
  return(<div style={{display:'flex',flexDirection:'column',gap:12}}>
    <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}><Kpi label="Actividades" val={nc.length} icon="📋"/><Kpi label="Finalizadas" val={nc.filter(a=>+a.pct>=1).length} color="#2ecc71" icon="✅"/><Kpi label="En Proceso" val={nc.filter(a=>+a.pct>0&&+a.pct<1).length} color="#f39c12" icon="🟡"/><Kpi label="Atrasadas" val={nc.filter(a=>a.fFinPlan&&new Date(a.fFinPlan)<new Date()&&+a.pct<1).length} color="#e74c3c" icon="🔴"/></div>
    <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn" onClick={()=>setShowAdd(!showAdd)}>+ Agregar</button></div>
    {showAdd&&<div className="card" style={{padding:14}}><div className="sec">Nueva Actividad</div><div style={{display:'grid',gridTemplateColumns:'80px 1fr 120px 120px 90px 80px auto',gap:8,alignItems:'end'}}>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Núm.</label><input value={na.num} onChange={e=>setNa({...na,num:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Descripción</label><input value={na.desc} onChange={e=>setNa({...na,desc:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Inicio Plan</label><input type="date" value={na.fIniPlan} onChange={e=>setNa({...na,fIniPlan:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>Fin Plan</label><input type="date" value={na.fFinPlan} onChange={e=>setNa({...na,fFinPlan:e.target.value})} className="inp"/></div>
      <div><label style={{fontSize:10,color:'#94a3b8'}}>% Avance</label><input type="number" min="0" max="100" value={na.pct!==''?+(na.pct*100).toFixed(0):''} onChange={e=>setNa({...na,pct:+e.target.value/100})} className="inp"/></div>
      <div style={{paddingTop:14}}><label style={{fontSize:10,color:'#94a3b8',display:'block'}}>Cap.</label><input type="checkbox" checked={na.esCapitulo} onChange={e=>setNa({...na,esCapitulo:e.target.checked})} style={{marginTop:6}}/></div>
      <div style={{paddingTop:14}}><button className="btn" onClick={add}>+</button></div>
    </div></div>}
    <div className="card" style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}>
      <thead><tr><th style={{width:60}}>Núm.</th><th>Actividad</th><th style={{width:112,textAlign:'center'}}>Ini.Plan</th><th style={{width:112,textAlign:'center'}}>Fin Plan</th><th style={{width:112,textAlign:'center'}}>Ini.Real</th><th style={{width:112,textAlign:'center'}}>Fin Real</th><th style={{width:130}}>% Avance</th><th style={{width:65,textAlign:'center'}}>Días</th><th style={{width:100}}>Estado</th><th style={{width:40}}></th></tr></thead>
      <tbody>{actividades.map((a,i)=>{const dp=days(a.fIniPlan,a.fFinPlan);const pv=+a.pct||0;return(
        <tr key={a.id} style={{background:a.esCapitulo?'#1a3a5c':i%2===0?'#1a2332':'#1e2d3d'}}>
          <td style={{color:'#94a3b8',fontSize:12}}>{a.num}</td>
          <td style={{fontWeight:a.esCapitulo?700:400,color:a.esCapitulo?'#60a5fa':'#e2e8f0'}}>{a.desc}</td>
          {['fIniPlan','fFinPlan','fIniReal','fFinReal'].map(field=><td key={field} style={{textAlign:'center'}}>{!a.esCapitulo&&<input type="date" value={a[field]||''} onChange={e=>upd(a.id,field,e.target.value)} style={{background:'transparent',border:'1px solid #e2e8f0',color:'#94a3b8',borderRadius:4,padding:'3px 4px',fontSize:11,width:108}}/>}</td>)}
          <td>{!a.esCapitulo&&<div><div style={{fontSize:11,color:'#94a3b8',marginBottom:2}}>{(pv*100).toFixed(0)}%</div><div className="pbar"><div className="pfill" style={{width:`${pv*100}%`}}/></div><input type="range" min="0" max="100" value={pv*100} onChange={e=>upd(a.id,'pct',+e.target.value/100)} style={{width:'100%',marginTop:2,accentColor:'#e67e22',cursor:'pointer'}}/></div>}</td>
          <td style={{textAlign:'center',color:'#94a3b8',fontSize:12}}>{!a.esCapitulo&&dp!==null?`${dp}d`:''}</td>
          <td>{!a.esCapitulo&&est(a)}</td>
          <td><button onClick={()=>del(a.id)} className="btn-del">🗑</button></td>
        </tr>);
      })}</tbody>
    </table></div>
  </div>);
};

// ── CLOUD SYNC PANEL ─────────────────────────────────────────
const CloudSyncPanel=({onClose,onRestoreAll})=>{
  const [cfg,setCfgState]=useState(getCloudCfg());
  const [status,setStatus]=useState('idle'); // idle|loading|ok|err
  const [msg,setMsg]=useState('');
  const [confirmRestore,setConfirmRestore]=useState(false);
  const [cloudMeta,setCloudMeta]=useState(null);

  const save=()=>{setCloudCfg(cfg);setMsg('Configuración guardada ✓');setTimeout(()=>setMsg(''),2000)};

  const doUpload=async()=>{
    setStatus('loading');setMsg('Subiendo todos los proyectos a la nube...');
    try{
      const all=loadProjects();
      const binId=await cloudSave(all);
      setCloudCfg({...cfg,binId});
      setCfgState(getCloudCfg());
      setStatus('ok');setMsg(`✅ ${Object.keys(all).length} proyecto(s) guardados en la nube · BIN: ${binId}`);
    }catch(e){setStatus('err');setMsg('❌ '+e.message);}
  };

  const doDownload=async()=>{
    setStatus('loading');setMsg('Leyendo datos desde la nube...');
    try{
      const record=await cloudLoad();
      setCloudMeta({device:record.device,savedAt:record.savedAt,count:Object.keys(record.projects||{}).length});
      setStatus('ok');setMsg(`✅ Datos encontrados · ${Object.keys(record.projects||{}).length} proyecto(s) · Guardado: ${new Date(record.savedAt).toLocaleString('es-CO')} desde ${record.device}`);
      setConfirmRestore(true);
    }catch(e){setStatus('err');setMsg('❌ '+e.message);}
  };

  const doRestore=async()=>{
    setStatus('loading');setMsg('Restaurando proyectos...');
    try{
      const record=await cloudLoad();
      const projects=record.projects||{};
      // Merge: cloud projects override local, keep local-only projects
      const local=loadProjects();
      const merged={...local,...projects};
      lsSet(STORE_KEY,merged);
      onRestoreAll(merged);
      setStatus('ok');setMsg(`✅ ${Object.keys(projects).length} proyecto(s) restaurados correctamente`);
      setConfirmRestore(false);
      setTimeout(onClose,1500);
    }catch(e){setStatus('err');setMsg('❌ '+e.message);}
  };

  const lastSync=cfg.lastSync?new Date(cfg.lastSync).toLocaleString('es-CO'):null;

  return(
    <div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div style={{background:'#0f172a',border:'1px solid #334155',borderRadius:14,padding:28,width:520,maxWidth:'96vw',color:'#e2e8f0',fontFamily:'inherit'}}>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>☁ Sincronización en la Nube</div>
            <div style={{fontSize:11,color:'#64748b',marginTop:2}}>SEKA Studio · Respaldo y sincronización iPad ↔ PC</div>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',color:'#64748b',fontSize:18,cursor:'pointer'}}>✕</button>
        </div>

        {/* Status banner */}
        {lastSync&&<div style={{background:'rgba(22,163,74,.15)',border:'1px solid #16a34a',borderRadius:6,padding:'7px 12px',fontSize:11,color:'#4ade80',marginBottom:14}}>
          🕐 Última sincronización: {lastSync} · BIN: {cfg.binId||'—'}
        </div>}

        {/* API Key config */}
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>API Key · JSONBin.io</div>
          <input value={cfg.apiKey} onChange={e=>setCfgState(c=>({...c,apiKey:e.target.value}))}
            placeholder="$2a$10$..." type="password"
            style={{width:'100%',background:'#1e293b',border:'1px solid #334155',borderRadius:6,padding:'8px 11px',color:'#e2e8f0',fontSize:12,outline:'none',fontFamily:'inherit'}}/>
          <div style={{fontSize:10,color:'#475569',marginTop:4}}>
            Obtén tu API Key gratis en <span style={{color:'#38bdf8'}}>jsonbin.io</span> → Register → API Keys → Create Access Key
          </div>
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'#64748b',textTransform:'uppercase',letterSpacing:1,marginBottom:5}}>BIN ID (se genera automáticamente en la primera subida)</div>
          <input value={cfg.binId||''} onChange={e=>setCfgState(c=>({...c,binId:e.target.value}))}
            placeholder="Se genera solo al subir por primera vez..."
            style={{width:'100%',background:'#1e293b',border:'1px solid #334155',borderRadius:6,padding:'8px 11px',color:'#e2e8f0',fontSize:12,outline:'none',fontFamily:'inherit'}}/>
          <div style={{fontSize:10,color:'#475569',marginTop:4}}>Si ya tienes un BIN ID de otro dispositivo, pégalo aquí antes de descargar.</div>
        </div>

        <button onClick={save} style={{padding:'6px 14px',background:'#334155',border:'1px solid #475569',borderRadius:6,color:'#e2e8f0',cursor:'pointer',fontSize:12,fontFamily:'inherit',marginBottom:18}}>
          💾 Guardar configuración
        </button>

        {/* Action buttons */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>

          <button onClick={doUpload} disabled={status==='loading'||!cfg.apiKey}
            style={{padding:'12px',background:'#16a34a',border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit',opacity:(!cfg.apiKey||status==='loading')?.5:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:22}}>☁↑</span>
            <span>Subir a la nube</span>
            <span style={{fontSize:10,fontWeight:400,opacity:.8}}>iPad → Nube → PC</span>
          </button>

          <button onClick={doDownload} disabled={status==='loading'||!cfg.apiKey}
            style={{padding:'12px',background:'#0ea5e9',border:'none',borderRadius:8,color:'#fff',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit',opacity:(!cfg.apiKey||status==='loading')?.5:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
            <span style={{fontSize:22}}>☁↓</span>
            <span>Bajar de la nube</span>
            <span style={{fontSize:10,fontWeight:400,opacity:.8}}>PC ← Nube ← iPad</span>
          </button>
        </div>

        {/* Confirm restore */}
        {confirmRestore&&cloudMeta&&(
          <div style={{background:'rgba(14,165,233,.1)',border:'1px solid #0ea5e9',borderRadius:8,padding:14,marginBottom:14}}>
            <div style={{fontSize:13,color:'#38bdf8',fontWeight:700,marginBottom:6}}>¿Restaurar datos de la nube?</div>
            <div style={{fontSize:12,color:'#94a3b8',marginBottom:10}}>
              Encontrado: <strong style={{color:'#e2e8f0'}}>{cloudMeta.count} proyecto(s)</strong> · 
              Guardado el {new Date(cloudMeta.savedAt).toLocaleString('es-CO')} · 
              Desde {cloudMeta.device}
            </div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:12}}>⚠️ Los proyectos en la nube se fusionarán con los locales. No se elimina nada.</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={doRestore} style={{padding:'7px 16px',background:'#0ea5e9',border:'none',borderRadius:6,color:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>
                ✅ Sí, restaurar
              </button>
              <button onClick={()=>setConfirmRestore(false)} style={{padding:'7px 16px',background:'#334155',border:'none',borderRadius:6,color:'#94a3b8',cursor:'pointer',fontSize:12,fontFamily:'inherit'}}>
                Cancelar
              </button>
            </div>
          </div>
        )}

        {/* Status message */}
        {msg&&<div style={{padding:'8px 12px',borderRadius:6,fontSize:12,marginBottom:12,
          background:status==='ok'?'rgba(22,163,74,.15)':status==='err'?'rgba(239,68,68,.15)':'rgba(148,163,184,.1)',
          border:`1px solid ${status==='ok'?'#16a34a':status==='err'?'#ef4444':'#334155'}`,
          color:status==='ok'?'#4ade80':status==='err'?'#f87171':'#94a3b8'}}>
          {status==='loading'&&<span style={{marginRight:8}}>⏳</span>}{msg}
        </div>}

        {/* Instructions */}
        <div style={{background:'#1e293b',borderRadius:8,padding:14,fontSize:11,color:'#64748b',lineHeight:1.7}}>
          <div style={{color:'#94a3b8',fontWeight:700,marginBottom:6}}>📋 Flujo de sincronización</div>
          <div><span style={{color:'#4ade80'}}>iPad → PC:</span> Abre la app en el iPad → ☁ Sync → <strong>Subir a la nube</strong> → Abre en PC → ☁ Sync → <strong>Bajar de la nube</strong></div>
          <div style={{marginTop:4}}><span style={{color:'#38bdf8'}}>PC → iPad:</span> Desde el PC → ☁ Sync → <strong>Subir a la nube</strong> → En el iPad → ☁ Sync → <strong>Bajar de la nube</strong></div>
          <div style={{marginTop:6,color:'#475569'}}>El BIN ID es el mismo para todos los dispositivos. Cópialo del primer dispositivo al segundo.</div>
        </div>

      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────────
// ── JSON EXPORT / IMPORT ─────────────────────────────────────
const downloadJSON = (projectName, data) => {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `SEKA_${(projectName||'proyecto').replace(/\s+/g,'_')}_${date}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
};

const importJSON = (onImport) => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = async e => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      onImport(data, file.name.replace('.json',''));
    } catch(err) {
      alert('Archivo JSON inválido: ' + err.message);
    }
  };
  inp.click();
};

const TABS=[{id:'dashboard',label:'📊 Dashboard'},{id:'proyecto',label:'📋 Proyecto'},{id:'presupuesto',label:'💵 Presupuesto'},{id:'pagos',label:'💰 Pagos'},{id:'gastos',label:'💸 Gastos'},{id:'cronograma',label:'📅 Cronograma'},{id:'ot',label:'👷 OT Trabajadores'},{id:'contratos',label:'📄 Contratos'},{id:'informes',label:'📝 Informes'},{id:'actas',label:'📝 Actas M&M'}];

const App=()=>{
  const [tab,setTab]=useState('dashboard');const [projectId,setProjectId]=useState(null);const [projectName,setProjectName]=useState('');const [state,setState]=useState(null);const [showPM,setShowPM]=useState(true);const [showBk,setShowBk]=useState(false);const [showSync,setShowSync]=useState(false);const [saveMsg,setSaveMsg]=useState('');const autoRef=useRef();

  useEffect(()=>{if(!state||!projectId)return;saveProject(projectId,projectName,state);setSaveMsg('Guardado ✓');if(autoRef.current)clearTimeout(autoRef.current);autoRef.current=setTimeout(()=>setSaveMsg(''),2000)},[state]);

  const open=(id,name,data)=>{
    // Ensure new fields exist for old projects
    const d={...EMPTY_PROJECT,...data,proyecto:{...EMPTY_PROJECT.proyecto,...(data.proyecto||{})},ots:data.ots||[],contratos:data.contratos||[],informes:data.informes||[],actas:data.actas||[]};
    setProjectId(id);setProjectName(name);setState(d);setShowPM(false);
  };
  const set=(field,val)=>setState(s=>({...s,[field]:val}));
  const doManualBk=()=>{saveBackup(projectId,`Manual — ${tsLabel(Date.now())}`,state);setSaveMsg('💾 Backup guardado ✓');setTimeout(()=>setSaveMsg(''),2500)};
  const onRestoreAll=(merged)=>{const first=Object.values(merged)[0];if(first){open(first.id,first.name,first.data);}setShowPM(true);};

  return(<div style={{minHeight:'100vh',display:'flex',flexDirection:'column',background:'#f1f5f9'}}>
    {showPM&&<ProjectManager onSelect={open} onClose={()=>setShowPM(false)}/>}
    {showBk&&state&&<BackupPanel projectId={projectId} projectName={projectName} currentData={state} onRestore={data=>{const d={...EMPTY_PROJECT,...data,ots:data.ots||[],contratos:data.contratos||[],informes:data.informes||[],actas:data.actas||[]};setState(d);saveProject(projectId,projectName,d)}} onClose={()=>setShowBk(false)}/>}
    {showSync&&<CloudSyncPanel onClose={()=>setShowSync(false)} onRestoreAll={onRestoreAll}/>}
    <div style={{background:'#1e293b',borderBottom:'1px solid #334155',padding:'0 18px',display:'flex',alignItems:'center',justifyContent:'space-between',height:50,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div onClick={()=>setShowPM(true)} style={{cursor:'pointer',display:'flex',alignItems:'center'}}><SekaLogo w={110} inverted={true}/></div>
        {projectName&&<div style={{marginLeft:8,padding:'2px 10px',background:'#f1f5f9',borderRadius:14,fontSize:11,color:'#94a3b8',border:'1px solid #e2e8f0',cursor:'pointer'}} onClick={()=>setShowPM(true)}>📁 {projectName} ▾</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:5}}>
        {saveMsg&&<span style={{fontSize:11,color:'#4ade80'}}>{saveMsg}</span>}
        <span style={{fontSize:11,padding:'3px 8px',background:'rgba(22,163,74,.2)',border:'1px solid #16a34a',borderRadius:5,color:'#4ade80',fontWeight:600}}>🔍 OCR Gratis</span>
        <button className="btn-ghost" onClick={()=>setShowSync(true)} style={{fontSize:11,color:'#38bdf8',borderColor:'#0ea5e9',fontWeight:700,background:'rgba(14,165,233,.1)'}}>☁ Sync</button>
        {state&&<><button className="btn-ghost" onClick={()=>downloadJSON(projectName,state)} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>⬇ JSON</button>
        <button className="btn-ghost" onClick={doManualBk} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>💾 Backup</button>
        <button className="btn-ghost" onClick={()=>setShowBk(true)} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>🗂 Historial</button>
        <button className="btn-ghost" onClick={()=>importJSON((data,name)=>{const d={...EMPTY_PROJECT,...data,proyecto:{...EMPTY_PROJECT.proyecto,...(data.proyecto||{})},ots:data.ots||[],contratos:data.contratos||[],informes:data.informes||[],actas:data.actas||[]};const id='p_'+Date.now();const pname=data.proyecto?.nombre||name||'Importado';saveProject(id,pname,d);open(id,pname,d);})} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>⬆ Importar</button>
        <button className="btn-ghost" onClick={()=>setShowPM(true)} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>📁 Proyectos</button>
        <button className="btn-ghost" onClick={()=>window.print()} style={{fontSize:11,color:'#e2e8f0',borderColor:'#334155'}}>🖨 Imprimir</button></>}
      </div>
    </div>
    <div className="noprint" style={{background:'#1e293b',borderBottom:'1px solid #334155',padding:'0 18px',display:'flex',gap:2,overflowX:'auto',flexShrink:0}}>
      {TABS.map(t=><button key={t.id} onClick={()=>{if(!state){setShowPM(true);return;}setTab(t.id)}} className={tab===t.id&&state?'tab-on':'tab-off'}>{t.label}</button>)}
    </div>
    <div style={{flex:1,padding:18,overflowY:'auto',background:'#f1f5f9'}}>
      {!state?<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60vh',gap:14,background:'#f1f5f9'}}>
        <SekaLogo w={180} inverted={true}/>
        <div style={{fontSize:13,color:'#94a3b8'}}>Selecciona o crea un proyecto</div>
        <button className="btn" onClick={()=>setShowPM(true)}>Abrir Proyectos</button>
      </div>:(<>
        {tab==='dashboard'&&<Dashboard state={state}/>}
        {tab==='proyecto'&&<ProyectoTab data={state.proyecto} onChange={d=>set('proyecto',d)}/>}
        {tab==='presupuesto'&&<PresupuestoTab partidas={state.partidas} onChange={d=>set('partidas',d)}/>}
        {tab==='pagos'&&<PagosTab pagos={state.pagos} onChange={d=>set('pagos',d)} proyecto={state.proyecto}/>}
        {tab==='gastos'&&<GastosTab gastos={state.gastos} onChange={d=>set('gastos',d)} partidas={state.partidas} projectId={projectId}/>}
        {tab==='cronograma'&&<CronogramaTab actividades={state.actividades} onChange={d=>set('actividades',d)}/>}
        {tab==='ot'&&<OTTab ots={state.ots||[]} onChange={d=>set('ots',d)} projectId={projectId}/>}
        {tab==='contratos'&&<ContratosTab contratos={state.contratos||[]} onChange={d=>set('contratos',d)} projectId={projectId}/>}
        {tab==='informes'&&<InformesTab informes={state.informes||[]} onChange={d=>set('informes',d)} projectId={projectId} proyecto={state.proyecto}/>}
        {tab==='actas'&&<ActasTab actas={state.actas||[]} onChange={d=>set('actas',d)} proyecto={state.proyecto}/>}
      </>)}
    </div>
    <div style={{background:'#1e293b',borderTop:'1px solid #334155',padding:'5px 18px',fontSize:10,color:'#64748b',textAlign:'center'}}>
      SEKA Studio · 10 módulos · Guardado automático · IndexedDB para archivos · {MAX_BACKS} backups · ☁ Sync v2
    </div>
  </div>);
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>
